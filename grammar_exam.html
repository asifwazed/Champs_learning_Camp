<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boss Exam - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #e2e8f0; 
            --text-sub: #94a3b8; --pink: #f472b6; --cyan: #38bdf8; 
            --header-bg: rgba(15, 23, 42, 0.9); --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: #0f172a; --danger: #ef4444; --success: #10b981;
        }
        body.light-mode {
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #334155; 
            --text-sub: #64748b; --pink: #ec4899; --cyan: #0284c7; 
            --header-bg: rgba(248, 250, 252, 0.9); --border-color: #e2e8f0;
            --input-bg: #f1f5f9; --danger: #dc2626; --success: #059669;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; transition: background-color 0.4s, color 0.4s; overflow-x: hidden; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .header { padding: 25px 20px 20px; background: var(--header-bg); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: 0.4s;}
        .back-btn { color: var(--text-main); text-decoration: none; font-size: 18px; background: var(--input-bg); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); transition: 0.2s;}
        .back-btn:active { transform: scale(0.9); }
        
        .header-title-box { text-align: right; }
        .h-title { font-family: 'Outfit'; font-size: 18px; font-weight: 900; margin: 0; color: var(--danger); text-transform: uppercase; letter-spacing: 1px; }
        .h-sub { font-size: 11px; color: var(--text-sub); font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .magnet-element { transition: transform 0.2s ease; cursor: pointer; }
        .magnet-element:active { transform: scale(0.97) !important; }
        
        .fade-in { animation: slideUpFade 0.4s ease forwards; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        .boss-tracker { background: var(--card-bg); border: 1px solid var(--danger); border-radius: 16px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; box-shadow: 0 5px 20px rgba(239, 68, 68, 0.1); position: sticky; top: 90px; z-index: 40; backdrop-filter: blur(10px); }
        .tracker-label { font-size: 13px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; }
        .tracker-score { font-family: 'Outfit'; font-size: 24px; font-weight: 900; color: var(--danger); }
        .tracker-score span { color: var(--success); }

        .q-card { background: var(--card-bg); border-radius: 20px; padding: 25px 20px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; transition: 0.3s; }
        .q-text { font-size: 16px; font-weight: 800; color: var(--text-main); margin-bottom: 20px; line-height: 1.5; }
        .q-num { color: var(--danger); font-family: 'Outfit'; margin-right: 5px; }
        
        .opt-btn { display: block; width: 100%; text-align: left; padding: 16px 20px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 10px; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--text-main); cursor: pointer; transition: 0.2s; }
        .opt-btn:active { transform: scale(0.98); }
        .opt-btn.correct { background: rgba(16, 185, 129, 0.1) !important; border-color: var(--success) !important; color: var(--success) !important; font-weight: 800; }
        .opt-btn.wrong { background: rgba(239, 68, 68, 0.1) !important; border-color: var(--danger) !important; color: var(--danger) !important; font-weight: 800; }
        
        .exp-box { display: none; margin-top: 15px; padding: 15px; background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--cyan); border-radius: 8px; font-size: 14px; color: var(--text-main); line-height: 1.5; font-weight: 500; animation: slideUpFade 0.3s ease; }

        .finish-btn { width: 100%; background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; border: none; padding: 20px; border-radius: 16px; font-weight: 800; font-size: 18px; font-family: 'Outfit'; cursor: pointer; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3); margin-top: 20px; display: none; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('champTheme') === 'light') { document.body.classList.add('light-mode'); }</script>

    <div class="header">
        <a href="index.html" class="back-btn magnet-element"><i class="fas fa-arrow-left"></i></a>
        <div class="header-title-box">
            <h1 class="h-title"><i class="fas fa-skull"></i> Boss Exam</h1>
            <div class="h-sub">Varsity Simulator</div>
        </div>
    </div>

    <div class="container fade-in">
        
        <div class="boss-tracker">
            <div class="tracker-label">Survival Score</div>
            <div class="tracker-score"><span id="score-correct">0</span> / <span id="score-total" style="color:var(--text-sub);">0</span></div>
        </div>

        <div id="boss-exam-container">
            <div style="text-align:center; padding:40px; color:var(--danger);"><i class="fas fa-circle-notch fa-spin" style="font-size: 30px;"></i></div>
        </div>

        <button class="finish-btn magnet-element" id="finish-boss-btn" onclick="BossEngine.finishExam()">Claim Victory <i class="fas fa-crown"></i></button>

    </div>

    <script src="boss-db.js"></script>
    <script src="boss-engine.js"></script>
    
    <script src="global-engine.js"></script>
</body>
</html>
