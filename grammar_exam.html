<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Boss - Varsity Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Dual Theme Variables Sync */
        :root { 
            --bg: #09090b; 
            --card-bg: rgba(255, 255, 255, 0.03); 
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            --cyan: #06b6d4; 
            --pink: #ec4899;
            --gold: #fbbf24;
            --header-bg: rgba(9, 9, 11, 0.85);
            --border-color: rgba(255, 255, 255, 0.05);
            --shadow-color: rgba(0,0,0,0.6);
            --input-bg: rgba(255,255,255,0.05);
        }

        body.light-mode {
            --bg: #f8fafc; 
            --card-bg: rgba(255, 255, 255, 0.6); 
            --text-main: #0f172a; 
            --text-sub: #475569; 
            --cyan: #0284c7; 
            --pink: #db2777;
            --gold: #d97706;
            --header-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(255, 255, 255, 0.5);
            --shadow-color: rgba(0,0,0,0.05);
            --input-bg: rgba(0,0,0,0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); overflow-x: hidden; padding-bottom: 50px; transition: background-color 0.5s ease, color 0.5s ease; }

        /* GLASSMORPHISM HEADER */
        .header { padding: 30px 20px 25px; background: var(--header-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border-color); box-shadow: 0 10px 30px var(--shadow-color); transition: 0.5s; }
        .back-btn { color: var(--text-main); text-decoration: none; font-size: 20px; background: var(--card-bg); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; border: 1px solid var(--border-color); }
        .back-btn:active { transform: scale(0.9); }
        .header-title-box { text-align: right; }
        .header-title { font-family: 'Outfit'; font-size: 24px; font-weight: 900; margin: 0; color: #ef4444; letter-spacing: 1px;}
        .header-sub { font-size: 12px; color: var(--text-sub); margin-top: 3px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        /* CORE UTILITIES USED BY ENGINE */
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--border-color); box-shadow: 0 10px 30px var(--shadow-color); }
        .fade-in { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .magnet-element { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease, background 0.2s; cursor: pointer; }
        .magnet-element:active { transform: scale(0.95) !important; }
        
        /* Option Button Interactive Hover */
        .boss-opt-btn:hover { background: var(--card-bg) !important; border-color: var(--cyan) !important; }
    </style>
</head>
<body>
    <script>
        // Dual Theme Initialization
        if(localStorage.getItem('champTheme') === 'light') { document.body.classList.add('light-mode'); }
    </script>

    <div class="header">
        <a href="javascript:void(0)" onclick="if(window.BossEngine) { BossEngine.exitExam(); } else { window.location.href='index.html'; }" class="back-btn magnet-element"><i class="fas fa-arrow-left"></i></a>
        <div class="header-title-box">
            <h2 class="header-title">THE BOSS</h2>
            <div class="header-sub">Varsity Simulator</div>
        </div>
    </div>

    <div id="app-container" style="max-width: 800px; margin: 0 auto; min-height: 80vh;"></div>

    <script src="boss-db.js"></script>
    <script src="boss-engine.js"></script>
    
    <script src="ai-database.js"></script>
    <script src="global-engine.js"></script> 
</body>
</html>
