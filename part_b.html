<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Part B: Grammar Vault</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #14b8a6; --bg: #f8fafc; --text: #0f172a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }

        /* GLASSMORPHISM HEADER */
        .header { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); color: white; padding: 25px 24px 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); position: sticky; top: 0; z-index: 50; }
        .back-btn { position: absolute; left: 20px; top: 25px; color: white; font-size: 20px; text-decoration: none; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .m-title { font-family: 'Outfit'; font-size: 24px; font-weight: 800; margin: 0; text-align: center; color: #5eead4; }
        .m-sub { font-size: 13px; color: #94a3b8; margin-top: 5px; font-weight: 600; text-align: center; }

        .container { padding: 0 20px; margin-top: -20px; position: relative; z-index: 60; }
        
        /* SPECIFIC EXERCISE STYLES */
        .gap-input {
            border: none; border-bottom: 2px solid #cbd5e1; background: transparent;
            width: 70px; text-align: center; font-weight: 700; color: #0ea5e9;
            font-family: inherit; font-size: 15px; outline: none; margin: 0 5px;
            transition: 0.3s;
        }
        .gap-input:focus { border-bottom-color: #0ea5e9; }
        .gap-input.correct { border-bottom-color: #10b981; color: #10b981; }
        .gap-input.wrong { border-bottom-color: #ef4444; color: #ef4444; }

        .explanation-box {
            background: #f1f5f9; padding: 15px; border-radius: 12px; margin-top: 10px;
            font-size: 13px; display: none; border-left: 4px solid #14b8a6;
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1 class="m-title">Grammar Vault</h1>
        <div class="m-sub">20 Marks Blueprint</div>
    </div>

    <div id="app-container" class="container">
        </div>

    <script src="grammar-db.js"></script>
    <script src="grammar-engine.js"></script>
    <script>
        window.onload = () => { GrammarEngine.init(); };
    </script>
    <script src="global-engine.js"></script>
</body>
</html>
