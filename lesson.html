<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Reader - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --primary: #3b82f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; overflow-x: hidden; }

        /* PREMIUM GLASS HEADER */
        .header { padding: 25px 20px 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .back-btn { color: white; text-decoration: none; font-size: 18px; background: rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .back-btn:active { transform: scale(0.9); }
        .header-info { text-align: right; }
        .h-title { font-family: 'Outfit'; font-size: 20px; font-weight: 800; margin: 0; color: #60a5fa; }
        .h-sub { font-size: 11px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        
        /* MAGNETIC & ANIMATIONS */
        .magnet-element { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease; cursor: pointer; }
        .magnet-element:active { transform: scale(0.96) !important; }
        .fade-in { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        /* SMART READER UI */
        .reader-controls { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .focus-toggle { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; color: #475569; }
        
        .passage-container { background: white; padding: 30px 25px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .passage-title { font-family: 'Outfit'; font-size: 26px; font-weight: 800; color: #1e293b; margin: 0 0 25px; line-height: 1.3; }
        
        /* INTERACTIVE SENTENCES */
        .smart-sentence { display: inline; cursor: pointer; transition: 0.2s; border-radius: 4px; padding: 2px 4px; margin: 0 -4px; line-height: 2.2; font-size: 17px; color: #334155; }
        .smart-sentence:hover { background: #f0f9ff; color: #1e40af; }
        .smart-sentence.active { background: #dbeafe; color: #1d4ed8; font-weight: 600; box-shadow: 0 2px 5px rgba(59,130,246,0.2); }
        
        .translation-box { display: none; background: linear-gradient(135deg, #1e293b, #0f172a); color: #f8fafc; padding: 15px 20px; border-radius: 12px; margin: 10px 0 15px; font-size: 15px; line-height: 1.6; border-left: 4px solid #3b82f6; animation: expandDown 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .translation-box.show { display: block; }
        @keyframes expandDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* AI ACTION ENGINE */
        .ai-engine-box { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 25px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .ai-engine-box::before { content: '\f544'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; top: -20px; right: -20px; font-size: 150px; color: rgba(255,255,255,0.03); transform: rotate(-15deg); }
        
        .ai-engine-title { font-family: 'Outfit'; font-size: 18px; color: white; margin: 0 0 5px; display: flex; align-items: center; gap: 10px; position: relative; z-index: 2; }
        .ai-engine-desc { font-size: 13px; color: #94a3b8; margin: 0 0 20px; line-height: 1.5; position: relative; z-index: 2; }
        
        .ai-action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; position: relative; z-index: 2; }
        .ai-btn { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 16px; font-size: 14px; font-weight: 700; font-family: 'Outfit'; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.3s; }
        .ai-btn i { font-size: 22px; }
        .ai-btn.flow { color: #38bdf8; background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.3); }
        .ai-btn.sum { color: #a7f3d0; background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.3); }
        .ai-btn.mcq { color: #fca5a5; background: rgba(244, 63, 94, 0.1); border-color: rgba(244, 63, 94, 0.3); grid-column: span 2; flex-direction: row; justify-content: center; }

    </style>
</head>
<body>

    <div class="header">
        <a href="units.html" class="back-btn magnet-element"><i class="fas fa-arrow-left"></i></a>
        <div class="header-info">
            <h1 class="h-title" id="ui-unit">Loading...</h1>
            <div class="h-sub" id="ui-lesson">Smart Reader</div>
        </div>
    </div>

    <div class="container fade-in">
        
        <div class="reader-controls magnet-element" onclick="SmartReader.toggleAllTranslations()">
            <div class="focus-toggle">
                <i class="fas fa-language" style="color: #3b82f6; font-size: 18px;"></i>
                <span id="toggle-text">Tap to show all translations</span>
            </div>
            <i class="fas fa-toggle-off" id="toggle-icon" style="font-size: 24px; color: #cbd5e1; transition: 0.3s;"></i>
        </div>

        <div class="passage-container">
            <h2 class="passage-title" id="passage-title">...</h2>
            <div id="passage-content"></div>
        </div>

        <div class="ai-engine-box magnet-element">
            <h3 class="ai-engine-title"><i class="fas fa-robot" style="color: #60a5fa;"></i> Mini Champ Automation</h3>
            <p class="ai-engine-desc">Instantly generate perfect board-standard answers for this exact passage using the AI Engine.</p>
            
            <div class="ai-action-grid">
                <button class="ai-btn flow magnet-element" onclick="SmartReader.generateAI('flowchart')">
                    <i class="fas fa-project-diagram"></i> Make Flow Chart
                </button>
                <button class="ai-btn sum magnet-element" onclick="SmartReader.generateAI('summary')">
                    <i class="fas fa-align-left"></i> Write Summary
                </button>
                <button class="ai-btn mcq magnet-element" onclick="SmartReader.generateAI('mcq')">
                    <i class="fas fa-question-circle"></i> Quiz Me (MCQs)
                </button>
            </div>
        </div>

    </div>

    <script>
        // =====================================================================
        // 🧠 THE SMART READER ENGINE & DATABASE
        // =====================================================================
        
        // Massive Sample Database for U1 L1 (You can move this to database.js later)
        const smartDatabase = {
            "u1_l1": {
                unitName: "Unit 1",
                lessonName: "Lesson 1",
                title: "Nelson Mandela: From Apartheid Fighter to President",
                sentences: [
                    { en: "Nelson Mandela guided South Africa from the shackles of apartheid to a multi-racial democracy.", bn: "নেলসন ম্যান্ডেলা দক্ষিণ আফ্রিকাকে বর্ণবাদের শৃঙ্খল থেকে বহুজাতিক গণতন্ত্রের দিকে পরিচালিত করেছিলেন।" },
                    { en: "He acted as an icon of peace and reconciliation who came to embody the struggle for justice around the world.", bn: "তিনি শান্তি ও পুনর্মিলনের এক প্রতীক হিসেবে কাজ করেছিলেন, যিনি বিশ্বজুড়ে ন্যায়ের সংগ্রামের প্রতিমূর্তি হয়ে উঠেছিলেন।" },
                    { en: "Imprisoned for nearly three decades for his fight against white minority rule, Mandela never lost his resolve.", bn: "শ্বেতাঙ্গ সংখ্যালঘু শাসনের বিরুদ্ধে লড়াইয়ের জন্য প্রায় তিন দশক কারারুদ্ধ থাকলেও ম্যান্ডেলা কখনোই তার সংকল্প হারাননি।" },
                    { en: "He was determined to bring down apartheid while avoiding a civil war.", bn: "তিনি গৃহযুদ্ধ এড়িয়ে বর্ণবাদকে ধ্বংস করতে বদ্ধপরিকর ছিলেন।" },
                    { en: "His prestige and charisma helped him win the support of the world.", bn: "তার সম্মান এবং আকর্ষণীয় ব্যক্তিত্ব তাকে সারা বিশ্বের সমর্থন জয় করতে সাহায্য করেছিল।" },
                    { en: "'I hate race discrimination most intensely and in all its manifestations,' he said.", bn: "'আমি বর্ণবৈষম্যকে সবচেয়ে তীব্রভাবে এবং এর সব রূপেই ঘৃণা করি,' তিনি বলেছিলেন।" },
                    { en: "'I have fought it all during my life; I will fight it now, and will do so until the end of my days.'", bn: "'আমি সারাজীবন এর বিরুদ্ধে লড়াই করেছি; আমি এখনও করব, এবং আমার জীবনের শেষ দিন পর্যন্ত তা করে যাব।'" }
                ]
            }
        };

        const SmartReader = {
            currentLessonId: null,
            passageData: null,
            isAllVisible: false,

            init: function() {
                // Get URL Parameter (e.g., ?unit=u1_l1)
                const urlParams = new URLSearchParams(window.location.search);
                this.currentLessonId = urlParams.get('unit') || 'u1_l1'; // Default to Mandela
                
                // Load Data
                this.passageData = smartDatabase[this.currentLessonId];
                
                if(!this.passageData) {
                    document.getElementById('passage-title').innerText = "Module Under Construction";
                    document.getElementById('passage-content').innerHTML = "Asif is currently engineering the smart translation data for this specific lesson. Please check back later!";
                    return;
                }

                // Update UI
                document.getElementById('ui-unit').innerText = this.passageData.unitName;
                document.getElementById('ui-lesson').innerText = this.passageData.lessonName;
                document.getElementById('passage-title').innerText = this.passageData.title;

                this.renderPassage();
            },

            renderPassage: function() {
                let html = "";
                this.passageData.sentences.forEach((item, index) => {
                    html += `
                        <span class="smart-sentence" id="sent-${index}" onclick="SmartReader.toggleSingle(${index})">${item.en}</span>
                        <div class="translation-box" id="trans-${index}"><strong><i class="fas fa-language" style="color:#60a5fa;"></i> অনুবাদ:</strong> ${item.bn}</div>
                    `;
                });
                document.getElementById('passage-content').innerHTML = html;
            },

            toggleSingle: function(index) {
                const sentEl = document.getElementById(`sent-${index}`);
                const transEl = document.getElementById(`trans-${index}`);
                
                if(transEl.classList.contains('show')) {
                    transEl.classList.remove('show');
                    sentEl.classList.remove('active');
                } else {
                    // Optional: Close others for a clean reading experience
                    document.querySelectorAll('.translation-box').forEach(el => el.classList.remove('show'));
                    document.querySelectorAll('.smart-sentence').forEach(el => el.classList.remove('active'));
                    
                    transEl.classList.add('show');
                    sentEl.classList.add('active');
                    if(navigator.vibrate) navigator.vibrate(20);
                }
            },

            toggleAllTranslations: function() {
                this.isAllVisible = !this.isAllVisible;
                const toggleIcon = document.getElementById('toggle-icon');
                const toggleText = document.getElementById('toggle-text');

                if(this.isAllVisible) {
                    toggleIcon.className = "fas fa-toggle-on";
                    toggleIcon.style.color = "#10b981";
                    toggleText.innerText = "All translations visible";
                    document.querySelectorAll('.translation-box').forEach(el => el.classList.add('show'));
                    document.querySelectorAll('.smart-sentence').forEach(el => el.classList.add('active'));
                } else {
                    toggleIcon.className = "fas fa-toggle-off";
                    toggleIcon.style.color = "#cbd5e1";
                    toggleText.innerText = "Tap to show all translations";
                    document.querySelectorAll('.translation-box').forEach(el => el.classList.remove('show'));
                    document.querySelectorAll('.smart-sentence').forEach(el => el.classList.remove('active'));
                }
            },

            generateAI: function(actionType) {
                if(!this.passageData) return;

                // Extract full English text
                const fullText = this.passageData.sentences.map(s => s.en).join(" ");
                let prompt = "";

                if(actionType === 'flowchart') {
                    prompt = `Act as an elite HSC Examiner. I am studying the passage: "${this.passageData.title}".\n\nBased ONLY on the text below, generate a perfect 6-box Flow Chart. The first box should be provided as an example. Keep the phrases short (V+ing or Noun phrases). Format it clearly using arrows (⬇️).\n\nText:\n"${fullText}"`;
                } else if(actionType === 'summary') {
                    prompt = `Act as an elite HSC Examiner. Write a perfect, high-scoring summary (strictly within 5-6 sentences) of the following passage. Ensure you capture the main theme without copying exact lines.\n\nText:\n"${fullText}"`;
                } else if(actionType === 'mcq') {
                    prompt = `Act as an HSC Examiner. Create a 5-question Multiple Choice Quiz based on the following passage to test my comprehension and vocabulary. Do NOT show me the answers yet, let me guess first!\n\nText:\n"${fullText}"`;
                }

                // Bridge to Global AI Engine
                if (typeof window.toggleAI === 'function') {
                    const aiWin = document.getElementById('ai-window');
                    if (aiWin && aiWin.style.display !== 'flex') {
                        window.toggleAI();
                    }
                    const aiInput = document.getElementById('ai-input');
                    if(aiInput) {
                        aiInput.value = prompt;
                        window.sendUserMessage();
                    }
                } else {
                    alert("Error: Mini Champ AI Engine is offline. Please check your connection.");
                }
            }
        };

        window.onload = () => SmartReader.init();

    </script>

    <script src="ai-database.js"></script>
    <script src="global-engine.js"></script>
</body>
</html>
