<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --bg: #f8fafc; --text: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .header { background: #1e293b; color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 50; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .back-btn { position: absolute; left: 20px; top: 20px; color: white; font-size: 20px; text-decoration: none; }
        .container { padding: 20px; }
        
        .highlight-tip { background: #eff6ff; color: #1d4ed8; padding: 10px 15px; border-radius: 12px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border: 1px dashed #bfdbfe; }
        
        .vocab-box { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 4px solid #f59e0b; }
        .v-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        .chunk-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); line-height: 1.8; font-size: 16px; color: #334155; }
        .bn-text { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #cbd5e1; color: #059669; font-family: 'Hind Siliguri'; font-size: 15px; }
        .toggle-btn { background: #eff6ff; color: #3b82f6; border: none; padding: 8px 15px; border-radius: 50px; font-weight: 700; cursor: pointer; font-size: 12px; margin-top: 10px; display: inline-flex; align-items: center; gap: 5px; }
        
        .exam-btn { display: block; width: 100%; background: linear-gradient(135deg, #10b981, #059669); color: white; text-align: center; padding: 18px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 18px; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="units.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-family:'Outfit'; font-size:18px;" id="l-title">Loading...</h2>
    </div>

    <div class="container">
        <div class="highlight-tip">
            <i class="fas fa-mouse-pointer" style="font-size: 18px; color: #3b82f6;"></i>
            Double-tap any difficult English word below to see its Bengali meaning!
        </div>

        <div class="vocab-box">
            <h3 style="margin:0 0 15px; font-family:'Outfit'; color:#b45309;"><i class="fas fa-book-reader"></i> Core Vocabulary</h3>
            <div id="vocab-list"></div>
        </div>

        <div id="chunks-container"></div>

        <a href="#" id="go-exam" class="exam-btn">Take Unit Exam <i class="fas fa-arrow-right"></i></a>
    </div>

    <script src="database.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const unitId = urlParams.get('unit') || 'u1_l1'; 
        const data = unitData[unitId];

        if(data) {
            document.getElementById('l-title').innerText = data.title;
            document.getElementById('go-exam').href = `exam.html?unit=${unitId}`;

            document.getElementById('vocab-list').innerHTML = data.vocab.map(v => 
                `<div class="v-item"><strong>${v.w}</strong> <span style="color:#64748b;">${v.m}</span></div>`
            ).join('');

            document.getElementById('chunks-container').innerHTML = data.chunks.map((c, i) => `
                <div class="chunk-card">
                    <div>${c.en}</div>
                    <button class="toggle-btn" onclick="document.getElementById('bn-${i}').style.display='block'; this.style.display='none';"><i class="fas fa-language"></i> View Bangla Meaning</button>
                    <div class="bn-text" id="bn-${i}">${c.bn}</div>
                </div>
            `).join('');
        }
    </script>
    
    <script src="vocab.js"></script>
    <script src="ai-database.js"></script>
    <script src="global-engine.js"></script>
</body>
</html>
