<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Reader - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --primary: #3b82f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; overflow-x: hidden; }

        /* HEADER */
        .header { padding: 25px 20px 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .back-btn { color: white; text-decoration: none; font-size: 18px; background: rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .back-btn:active { transform: scale(0.9); }
        .header-info { text-align: right; }
        .h-title { font-family: 'Outfit'; font-size: 20px; font-weight: 800; margin: 0; color: #60a5fa; }
        .h-sub { font-size: 11px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .magnet-element { transition: transform 0.2s ease; cursor: pointer; }
        .magnet-element:active { transform: scale(0.96) !important; }
        .fade-in { animation: slideUpFade 0.4s ease forwards; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        /* SMART READER CONTROLS */
        .reader-controls { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .focus-toggle { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; color: #475569; }
        
        .passage-container { background: white; padding: 25px 20px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .passage-title { font-family: 'Outfit'; font-size: 22px; font-weight: 800; color: #1e293b; margin: 0 0 20px; line-height: 1.3; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        
        /* INTERACTIVE PARAGRAPHS (TAP TO TRANSLATE) */
        .smart-paragraph { cursor: pointer; transition: 0.3s; border-radius: 12px; padding: 15px; margin-bottom: 10px; font-size: 16px; color: #334155; line-height: 1.8; border: 1px solid transparent; }
        .smart-paragraph:hover { background: #f8fafc; }
        
        /* HIGHLIGHT STATE */
        .smart-paragraph.active { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; box-shadow: 0 4px 15px rgba(59,130,246,0.1); }
        
        .translation-box { display: none; background: linear-gradient(135deg, #1e293b, #0f172a); color: #f8fafc; padding: 18px 20px; border-radius: 12px; margin: -5px 0 20px; font-size: 15px; line-height: 1.6; border-left: 4px solid #3b82f6; animation: expandDown 0.3s ease; box-shadow: 0 10px 25px rgba(0,0,0,0.15); position: relative; z-index: 2; }
        .translation-box.show { display: block; }
        @keyframes expandDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* THE NEW EXAM UI */
        .exam-container { background: white; padding: 25px 20px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .exam-header { font-family: 'Outfit'; font-size: 22px; font-weight: 800; color: #1e293b; margin: 0 0 10px; display: flex; align-items: center; gap: 10px;}
        .exam-section { margin-bottom: 30px; }
        .exam-section h3 { font-family: 'Outfit'; font-size: 17px; color: #1e293b; margin: 0 0 15px; padding-bottom: 10px; border-bottom: 2px dashed #e2e8f0; }
        
        .question-block { margin-bottom: 20px; }
        .q-text { font-size: 15px; font-weight: 700; color: #334155; margin-bottom: 12px; line-height: 1.5; }
        
        /* MCQ Buttons */
        .mcq-opt { display: block; width: 100%; text-align: left; padding: 12px 15px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 8px; font-family: inherit; font-size: 14px; font-weight: 600; color: #475569; cursor: pointer; transition: 0.2s; }
        .mcq-opt:active { transform: scale(0.98); }
        .mcq-opt.correct { background: #ecfdf5 !important; border-color: #10b981 !important; color: #059669 !important; }
        .mcq-opt.wrong { background: #fef2f2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        
        /* Input Areas */
        .exam-textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; outline: none; font-family: inherit; font-size: 14px; color: #1e293b; resize: vertical; min-height: 100px; background: #f8fafc; transition: 0.2s;}
        .exam-textarea:focus { border-color: #3b82f6; background: white; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        
        /* Flow Chart Boxes */
        .flow-box { border: 2px solid #3b82f6; padding: 15px; border-radius: 12px; font-weight: 700; font-size: 14px; text-align: center; }
        .flow-box.filled { background: #eff6ff; color: #1d4ed8; border-style: solid; }
        .flow-box.empty { background: white; color: #1e293b; outline: none; width: 100%; border-style: dashed; border-color: #cbd5e1; transition: 0.2s; }
        .flow-box.empty:focus { border-style: solid; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        
    </style>
</head>
<body>

    <div class="header">
        <a href="units.html" class="back-btn magnet-element"><i class="fas fa-arrow-left"></i></a>
        <div class="header-info">
            <h1 class="h-title" id="ui-unit">Loading...</h1>
            <div class="h-sub" id="ui-lesson">Smart Reader</div>
        </div>
    </div>

    <div class="container fade-in">
        
        <div class="reader-controls magnet-element" onclick="SmartReader.toggleAllTranslations()">
            <div class="focus-toggle">
                <i class="fas fa-language" style="color: #3b82f6; font-size: 18px;"></i>
                <span id="toggle-text">Tap to show all translations</span>
            </div>
            <i class="fas fa-toggle-off" id="toggle-icon" style="font-size: 24px; color: #cbd5e1; transition: 0.3s;"></i>
        </div>

        <div class="passage-container">
            <h2 class="passage-title" id="passage-title">...</h2>
            <div id="passage-content"></div>
        </div>

        <div class="exam-container" id="exam-container" style="display: none;">
            <h2 class="exam-header"><i class="fas fa-edit" style="color: #60a5fa;"></i> End of Lesson Exam</h2>
            <p style="color:#64748b; font-size:13px; margin-bottom:25px; line-height:1.5;">Tap the MCQs for instant answers. Write your answers for the Open-Ended, Flow Chart, and Summary sections directly below to submit them later!</p>
            
            <div id="exam-content"></div>
        </div>

    </div>

    <script src="database.js"></script>
    <script>
        const SmartReader = {
            currentLessonId: null, passageData: null, isAllVisible: false,

            init: function() {
                const urlParams = new URLSearchParams(window.location.search);
                this.currentLessonId = urlParams.get('unit') || 'u1_l1'; 
                
                // Safely reads from your existing database.js
                this.passageData = typeof unitData !== 'undefined' ? unitData[this.currentLessonId] : null;
                
                if(!this.passageData) {
                    document.getElementById('passage-title').innerText = "Module Locked / Under Construction";
                    document.getElementById('passage-content').innerHTML = "<div style='padding:20px; text-align:center; color:#64748b;'>Asif is currently engineering the data for this specific lesson. Please check back later!</div>";
                    return;
                }

                // Extract Unit and Lesson names
                let rawTitle = this.passageData.title || "";
                let splitTitle = rawTitle.split(': ');
                
                document.getElementById('ui-unit').innerText = splitTitle[0] || "Lesson";
                document.getElementById('ui-lesson').innerText = "Smart Reader";
                document.getElementById('passage-title').innerText = splitTitle[1] || rawTitle;
                
                this.renderPassage();
                this.renderExam(); // Loads the Exam
                
                // Mark as done for your progress bars
                localStorage.setItem(`unit_${this.currentLessonId}_done`, 'true');
            },

            renderPassage: function() {
                let html = "";
                // Now correctly loops through 'chunks' (paragraphs) instead of 'sentences'
                if (this.passageData.chunks && this.passageData.chunks.length > 0) {
                    this.passageData.chunks.forEach((item, index) => {
                        html += `
                            <div class="smart-paragraph" id="sent-${index}" onclick="SmartReader.toggleSingle(${index})">${item.en}</div>
                            <div class="translation-box" id="trans-${index}"><strong><i class="fas fa-language" style="color:#60a5fa;"></i> অনুবাদ:</strong><br>${item.bn}</div>
                        `;
                    });
                }
                document.getElementById('passage-content').innerHTML = html;
            },

            toggleSingle: function(index) {
                const sentEl = document.getElementById(`sent-${index}`);
                const transEl = document.getElementById(`trans-${index}`);
                
                // BUG FIXED: Tapping an open paragraph will now close it properly!
                if(transEl.classList.contains('show')) {
                    transEl.classList.remove('show'); 
                    sentEl.classList.remove('active');
                } else {
                    transEl.classList.add('show'); 
                    sentEl.classList.add('active');
                    if(navigator.vibrate) navigator.vibrate(20);
                }
            },

            toggleAllTranslations: function() {
                this.isAllVisible = !this.isAllVisible;
                const toggleIcon = document.getElementById('toggle-icon');
                const toggleText = document.getElementById('toggle-text');

                if(this.isAllVisible) {
                    toggleIcon.className = "fas fa-toggle-on"; 
                    toggleIcon.style.color = "#10b981"; 
                    toggleText.innerText = "All translations visible";
                    document.querySelectorAll('.translation-box').forEach(el => el.classList.add('show'));
                    document.querySelectorAll('.smart-paragraph').forEach(el => el.classList.add('active'));
                } else {
                    toggleIcon.className = "fas fa-toggle-off"; 
                    toggleIcon.style.color = "#cbd5e1"; 
                    toggleText.innerText = "Tap to show all translations";
                    document.querySelectorAll('.translation-box').forEach(el => el.classList.remove('show'));
                    document.querySelectorAll('.smart-paragraph').forEach(el => el.classList.remove('active'));
                }
            },

            // --- THE NEW EXAM ENGINE ---
            renderExam: function() {
                const examData = this.passageData.exam;
                
                // If there is no exam data for this lesson yet, show a nice message
                if (!examData || Object.keys(examData).length === 0 || !examData.mcqs) {
                    document.getElementById('exam-container').style.display = 'block';
                    document.getElementById('exam-content').innerHTML = `
                        <div style="background:#f8fafc; border:1px dashed #cbd5e1; padding:20px; border-radius:16px; text-align:center; color:#64748b;">
                            <i class="fas fa-tools" style="font-size:24px; color:#94a3b8; margin-bottom:10px;"></i>
                            <div style="font-weight:700;">Exam Under Construction</div>
                            <div style="font-size:13px; margin-top:5px;">Asif is currently updating the database with the exam questions for this lesson. Check back soon!</div>
                        </div>`;
                    return;
                }

                document.getElementById('exam-container').style.display = 'block';
                let html = ``;

                // 1. MCQ Section
                if (examData.mcqs && examData.mcqs.length > 0) {
                    html += `<div class="exam-section"><h3><i class="fas fa-check-circle" style="color:#10b981; margin-right:5px;"></i> Part 1: Multiple Choice Questions</h3>`;
                    examData.mcqs.forEach((mcq, i) => {
                        html += `<div class="question-block"><div class="q-text">${i+1}. ${mcq.q}</div>`;
                        mcq.options.forEach((opt, j) => {
                            html += `<button class="mcq-opt" id="mcq-${i}-${j}" onclick="SmartReader.checkMcq(${i}, ${j}, ${mcq.ans})">${['a','b','c','d'][j]}) ${opt}</button>`;
                        });
                        html += `</div>`;
                    });
                    html += `</div>`;
                }

                // 2. Open-Ended Questions
                if (examData.openEnded && examData.openEnded.length > 0) {
                    html += `<div class="exam-section"><h3><i class="fas fa-pen" style="color:#f59e0b; margin-right:5px;"></i> Part 2: Open-Ended Questions</h3>`;
                    examData.openEnded.forEach((q, i) => {
                        html += `
                        <div class="question-block">
                            <div class="q-text">${['a','b','c','d'][i]}. ${q}</div>
                            <textarea class="exam-textarea" placeholder="Write your answer here..."></textarea>
                        </div>`;
                    });
                    html += `</div>`;
                }

                // 3. Flow Chart
                if (examData.flowChartTopic) {
                    html += `
                    <div class="exam-section">
                        <h3><i class="fas fa-project-diagram" style="color:#8b5cf6; margin-right:5px;"></i> Part 3: Flow Chart</h3>
                        <p style="font-size:14px; color:#475569; margin-bottom:15px;">Based on your reading of the passage, make a short flow chart showing <b>${examData.flowChartTopic}</b>.</p>
                        <div style="display:flex; flex-direction:column; gap:10px;">
                            <div class="flow-box filled">1. ${examData.flowChartBox1}</div>`;
                    for(let i=2; i<=6; i++) {
                        html += `
                            <div style="text-align:center; color:#cbd5e1;"><i class="fas fa-arrow-down"></i></div>
                            <input type="text" class="flow-box empty" placeholder="${i}. Type your point here...">`;
                    }
                    html += `</div></div>`;
                }

                // 4. Summary
                html += `
                <div class="exam-section" style="margin-bottom:0;">
                    <h3><i class="fas fa-align-left" style="color:#ec4899; margin-right:5px;"></i> Part 4: Summary</h3>
                    <p style="font-size:14px; color:#475569; margin-bottom:15px;">Write a summary of the passage in your own words.</p>
                    <textarea class="exam-textarea" style="height:150px;" placeholder="Start writing your summary here..."></textarea>
                </div>`;

                document.getElementById('exam-content').innerHTML = html;
            },

            checkMcq: function(qIndex, selectedOpt, correctOpt) {
                // Instantly checks the MCQ answer
                for(let j=0; j<4; j++) {
                    let btn = document.getElementById(`mcq-${qIndex}-${j}`);
                    if(!btn) continue;
                    btn.disabled = true;
                    btn.style.cursor = 'default';
                    
                    if(j === correctOpt) {
                        btn.classList.add('correct');
                        btn.innerHTML += ' <i class="fas fa-check" style="float:right;"></i>';
                    } else if (j === selectedOpt && j !== correctOpt) {
                        btn.classList.add('wrong');
                        btn.innerHTML += ' <i class="fas fa-times" style="float:right;"></i>';
                    }
                }
                if(navigator.vibrate) navigator.vibrate(selectedOpt === correctOpt ? 50 : [50, 50, 50]);
            }
        };
        window.onload = () => SmartReader.init();
    </script>
    
    <script src="global-engine.js"></script>
</body>
</html>
