<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Utility Belt - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f1f5f9; --text-main: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); overflow-x: hidden; padding-bottom: 100px; }

        .header { padding: 25px 20px 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 50; color: white; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .header-title { font-family: 'Outfit'; font-size: 22px; font-weight: 800; margin: 0; }
        .header-sub { font-size: 12px; color: #94a3b8; }

        .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .tool-card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor:pointer; border: 1px solid #e2e8f0; transition: transform 0.1s; }
        .tool-card:active { transform: scale(0.96); }
        .tc-icon { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 10px; }
        .t-green { background: #ecfdf5; color: #10b981; } .t-gold { background: #fffbeb; color: #f59e0b; }
        .t-rose { background: #fff1f2; color: #e11d48; } .t-blue { background: #eff6ff; color: #3b82f6; }
        .t-purple { background: #f5f3ff; color: #8b5cf6; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="header-slot"></div>
    <div id="app-container"></div>

    <script src="database.js"></script>
    <script src="suggestions.js"></script>
    <script src="vocab.js"></script>
    <script src="tools-engine.js"></script>
    <script src="global-engine.js"></script>
    <script>
        window.onload = () => ToolsEngine.init();
    </script>
<script src="ai-database.js"></script>
    <script src="global-engine.js"></script> 
</body>
</html>
