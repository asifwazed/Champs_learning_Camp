<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Utility Belt - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Dual Theme Variables Sync */
        :root { 
            --bg: #09090b; 
            --card-bg: rgba(255, 255, 255, 0.03); 
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            --cyan: #06b6d4; 
            --pink: #ec4899;
            --gold: #fbbf24;
            --header-bg: rgba(9, 9, 11, 0.85);
            --border-color: rgba(255, 255, 255, 0.05);
            --shadow-color: rgba(0,0,0,0.6);
            --input-bg: rgba(255,255,255,0.05);
        }

        body.light-mode {
            --bg: #f8fafc; 
            --card-bg: rgba(255, 255, 255, 0.6); 
            --text-main: #0f172a; 
            --text-sub: #475569; 
            --cyan: #0284c7; 
            --pink: #db2777;
            --gold: #d97706;
            --header-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(255, 255, 255, 0.5);
            --shadow-color: rgba(0,0,0,0.05);
            --input-bg: rgba(0,0,0,0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); overflow-x: hidden; padding-bottom: 120px; transition: background-color 0.5s ease, color 0.5s ease; }

        /* PREMIUM GLASS HEADER */
        .header { padding: 30px 20px 25px; background: var(--header-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border-color); box-shadow: 0 10px 30px var(--shadow-color); transition: 0.5s; }
        .back-btn { color: var(--text-main); text-decoration: none; font-size: 20px; background: var(--card-bg); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; border: 1px solid var(--border-color); }
        .back-btn:active { transform: scale(0.9); }
        .header-title-box { text-align: right; }
        .header-title { font-family: 'Outfit'; font-size: 24px; font-weight: 800; margin: 0; color: var(--cyan); }
        .header-sub { font-size: 12px; color: var(--text-sub); margin-top: 3px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* MAGNETIC & ANIMATIONS */
        .magnet-element { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; cursor: pointer; }
        .magnet-element:active { transform: scale(0.95) !important; }
        .fade-in { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        /* TOOL GRID & CARDS */
        .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 800px; margin: 0 auto; }
        .tool-card { background: var(--card-bg); backdrop-filter: blur(15px); padding: 25px 15px; border-radius: 24px; text-align: center; box-shadow: 0 10px 30px var(--shadow-color); border: 1px solid var(--border-color); position: relative; overflow: hidden; z-index: 1; transition: 0.5s; color: var(--text-main); }
        .tool-card::after { content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transform: skewX(-20deg); transition: 0.6s ease; z-index: 3; pointer-events: none; }
        .tool-card:active::after { left: 150%; transition: 0s; }
        
        .tc-icon { width: 60px; height: 60px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 15px; z-index: 4; position: relative; border: 1px solid var(--border-color); }
        .tc-title { font-family: 'Outfit'; font-weight: 800; font-size: 16px; z-index: 4; position: relative; }
        .tc-sub { font-size: 11px; color: var(--text-sub); font-weight: 600; margin-top: 4px; z-index: 4; position: relative; }

        /* Icon Colors */
        .t-blue { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .t-rose { background: rgba(225, 29, 72, 0.1); color: #e11d48; }
        .t-green { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .t-gold { background: rgba(245, 158, 11, 0.1); color: var(--gold); }
        .t-purple { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }
        .t-teal { background: rgba(20, 184, 166, 0.1); color: #14b8a6; }

        /* POMODORO PULSE */
        @keyframes glowingPulse { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }
        .timer-running { animation: glowingPulse 2s infinite; border-color: var(--cyan) !important; }

        /* SCROLLBAR & SHARED FIXES */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: var(--input-bg); border-radius: 8px; }
        textarea::-webkit-scrollbar-thumb { background: var(--text-sub); border-radius: 8px; }
        .glass-panel { background: var(--card-bg) !important; backdrop-filter: blur(15px); border: 1px solid var(--border-color) !important; color: var(--text-main); box-shadow: 0 15px 35px var(--shadow-color); }
    </style>
</head>
<body>
    <script>
        if(localStorage.getItem('champTheme') === 'light') { document.body.classList.add('light-mode'); }
    </script>

    <div id="header-slot"></div>
    <div id="app-container" style="max-width: 800px; margin: 0 auto;"></div>

    <script src="database.js"></script>
    <script src="suggestions.js"></script>
    <script src="vocab.js"></script>
    <script src="tools-engine.js"></script>
    
    <script src="ai-database.js"></script>
    <script src="global-engine.js"></script> 
    
    <script>
        window.onload = () => ToolsEngine.init();
    </script>
</body>
</html>
