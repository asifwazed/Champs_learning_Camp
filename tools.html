<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Utility Belt - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f1f5f9; --text-main: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); overflow-x: hidden; padding-bottom: 120px; }

        /* PREMIUM GLASS HEADER */
        .header { padding: 30px 20px 25px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .back-btn { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .back-btn:active { transform: scale(0.9); }
        .header-title-box { text-align: right; }
        .header-title { font-family: 'Outfit'; font-size: 24px; font-weight: 800; margin: 0; color: #38bdf8; }
        .header-sub { font-size: 12px; color: #94a3b8; margin-top: 3px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* MAGNETIC & ANIMATIONS */
        .magnet-element { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; cursor: pointer; }
        .magnet-element:active { transform: scale(0.95) !important; }
        .fade-in { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        /* TOOL GRID */
        .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 800px; margin: 0 auto; }
        .tool-card { background: white; padding: 25px 15px; border-radius: 24px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; position: relative; overflow: hidden; z-index: 1; }
        .tool-card::after { content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent); transform: skewX(-20deg); transition: 0.6s ease; z-index: 3; pointer-events: none; }
        .tool-card:active::after { left: 150%; transition: 0s; }
        
        .tc-icon { width: 60px; height: 60px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 15px; z-index: 4; position: relative; }
        .tc-title { font-family: 'Outfit'; font-weight: 800; font-size: 16px; color: #1e293b; z-index: 4; position: relative; }
        .tc-sub { font-size: 11px; color: #64748b; font-weight: 600; margin-top: 4px; z-index: 4; position: relative; }

        /* Icon Gradients */
        .t-blue { background: linear-gradient(135deg, #eff6ff, #dbeafe); color: #3b82f6; box-shadow: 0 5px 15px rgba(59,130,246,0.15); }
        .t-rose { background: linear-gradient(135deg, #fff1f2, #ffe4e6); color: #e11d48; box-shadow: 0 5px 15px rgba(225,29,72,0.15); }
        .t-green { background: linear-gradient(135deg, #ecfdf5, #d1fae5); color: #10b981; box-shadow: 0 5px 15px rgba(16,185,129,0.15); }
        .t-gold { background: linear-gradient(135deg, #fffbeb, #fef3c7); color: #f59e0b; box-shadow: 0 5px 15px rgba(245,158,11,0.15); }
        .t-purple { background: linear-gradient(135deg, #f5f3ff, #ede9fe); color: #8b5cf6; box-shadow: 0 5px 15px rgba(139,92,246,0.15); }
        .t-teal { background: linear-gradient(135deg, #f0fdfa, #ccfbf1); color: #14b8a6; box-shadow: 0 5px 15px rgba(20,184,166,0.15); }

        /* POMODORO PULSE */
        @keyframes glowingPulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        .timer-running { animation: glowingPulse 2s infinite; border-color: #3b82f6 !important; }

        /* INPUT FIXES */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="header-slot"></div>
    <div id="app-container" style="max-width: 800px; margin: 0 auto;"></div>

    <script src="database.js"></script>
    <script src="suggestions.js"></script>
    <script src="vocab.js"></script>
    <script src="tools-engine.js"></script>
    
    <script src="ai-database.js"></script>
    <script src="global-engine.js"></script> 
    
    <script>
        window.onload = () => ToolsEngine.init();
    </script>
</body>
</html>
