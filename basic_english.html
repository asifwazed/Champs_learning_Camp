<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spoken Hub - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* DUAL THEME */
        :root { 
            --bg: #09090b; --card-bg: rgba(255, 255, 255, 0.03); --text-main: #f8fafc; 
            --text-sub: #94a3b8; --pink: #ec4899; --cyan: #06b6d4; 
            --header-bg: rgba(9, 9, 11, 0.85); --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.5); --overlay-bg: #09090b;
        }
        body.light-mode {
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #0f172a; 
            --text-sub: #475569; --pink: #ec4899; --cyan: #0ea5e9; 
            --header-bg: rgba(255, 255, 255, 0.85); --border-color: #e2e8f0;
            --input-bg: #f1f5f9; --overlay-bg: #f8fafc;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; transition: 0.4s; overflow-x: hidden; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .header { padding: 25px 20px 20px; background: var(--header-bg); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: 0.4s;}
        .back-btn { color: var(--text-main); text-decoration: none; font-size: 18px; background: var(--input-bg); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); transition: 0.2s;}
        .back-btn:active { transform: scale(0.9); }
        
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .section-title { font-family: 'Outfit'; font-size: 14px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1.5px; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .magnet-element { transition: transform 0.2s ease; cursor: pointer; }
        .magnet-element:active { transform: scale(0.97) !important; }

        /* LIST CARDS */
        .magnet-card { background: var(--card-bg); border-radius: 20px; padding: 20px 15px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; text-align: center; transition: 0.3s; backdrop-filter: blur(10px); }
        .card-icon { width: 55px; height: 55px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 12px; }
        .card-title { font-family: 'Outfit'; font-size: 16px; font-weight: 800; margin: 0 0 5px; color: var(--text-main); }
        .card-desc { font-size: 12px; color: var(--text-sub); margin: 0; font-weight: 600; }

        /* FULL SCREEN OVERLAYS */
        .overlay { position: fixed; inset: 0; background: var(--overlay-bg); z-index: 3000; display: none; flex-direction: column; animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes popIn { 0% { opacity: 0; transform: translateY(50px); } 100% { opacity: 1; transform: translateY(0); } }
        
        .overlay-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); background: var(--header-bg); backdrop-filter: blur(10px); }
        .overlay-title { font-family: 'Outfit'; font-size: 18px; font-weight: 800; color: var(--cyan); margin: 0; flex-grow: 1; text-align: center; }
        .overlay-body { padding: 20px; overflow-y: auto; flex-grow: 1; }

        .start-btn { width: 100%; background: linear-gradient(135deg, var(--pink), var(--cyan)); color: white; border: none; padding: 20px; border-radius: 16px; font-weight: 800; font-size: 18px; font-family: 'Outfit'; cursor: pointer; box-shadow: 0 10px 25px rgba(6, 182, 212, 0.4); margin-bottom: 15px; }
        
        /* VOICE GAME UI */
        .phrase-box { background: var(--card-bg); border: 1px solid var(--border-color); padding: 25px 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .bengali-text { font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 20px; line-height: 1.5; }
        
        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .word-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px 18px; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; font-family: inherit; transition: 0.2s; }
        
        .answer-slot { min-height: 60px; background: rgba(6, 182, 212, 0.05); border: 2px dashed var(--cyan); border-radius: 16px; display: flex; flex-wrap: wrap; gap: 8px; padding: 15px; justify-content: center; align-items: center; margin-bottom: 20px; }
        
        .prog-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border-color); }
        .prog-dot.active { background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('champTheme') === 'light') { document.body.classList.add('light-mode'); }</script>

    <div class="header">
        <a href="index.html" class="back-btn magnet-element"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align:right;">
            <h1 style="margin:0; font-family:'Outfit'; font-size:18px; color:var(--text-main);">Spoken Hub</h1>
            <div style="font-size:11px; color:var(--pink); font-weight:800; text-transform:uppercase; letter-spacing:1.5px;">Voice Scenarios</div>
        </div>
    </div>

    <div class="container" id="modules-container">
        <div style="text-align:center; padding:40px; color:var(--cyan);"><i class="fas fa-circle-notch fa-spin" style="font-size: 30px;"></i></div>
    </div>

    <div class="overlay" id="module-screen">
        <div class="overlay-header">
            <button onclick="closeSpokenOverlay('module-screen')" class="back-btn magnet-element"><i class="fas fa-arrow-left"></i></button>
            <h2 class="overlay-title" id="mod-title">Scenario</h2>
            <div style="width:40px;"></div>
        </div>
        <div class="overlay-body">
            <div id="mod-content" style="font-size: 16px; line-height: 1.7; color: var(--text-main); margin-bottom: 30px;"></div>
            
            <button class="start-btn magnet-element" onclick="startTranslationGame()"><i class="fas fa-gamepad"></i> Practice Phrases</button>
            <button class="start-btn magnet-element" onclick="triggerAiRoleplay()" style="background: linear-gradient(135deg, #f59e0b, #ea580c); box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);"><i class="fas fa-robot"></i> AI Roleplay</button>
        </div>
    </div>

    <div class="overlay" id="game-screen">
        <div class="overlay-header">
            <button onclick="closeSpokenOverlay('game-screen')" class="back-btn magnet-element"><i class="fas fa-times"></i></button>
            <h2 class="overlay-title" style="color:var(--pink);">Translate It</h2>
            <div style="width:40px;"></div>
        </div>
        <div class="overlay-body" style="display:flex; flex-direction:column; justify-content:center;">
            
            <div style="display:flex; justify-content:center; gap:8px; margin-bottom:30px;" id="game-progress"></div>

            <div class="phrase-box">
                <div class="bengali-text" id="game-bn"></div>
                <div class="answer-slot" id="ans-slot"></div>
                <div class="word-bank" id="word-bank"></div>
            </div>
            
            <button class="start-btn magnet-element" onclick="checkSpokenAnswer()" id="check-btn"><i class="fas fa-check-circle"></i> Check Answer</button>

            <div style="text-align:center; margin-top:20px;">
                <button onclick="playSpokenAudio()" class="magnet-element" style="background:rgba(6,182,212,0.1); color:var(--cyan); border:1px solid rgba(6,182,212,0.3); padding:15px; border-radius:50%; font-size:20px; cursor:pointer;"><i class="fas fa-volume-up"></i></button>
            </div>
        </div>
    </div>

    <script src="basic-db.js"></script>
    <script src="basic-engine.js"></script>
    <script src="global-engine.js"></script>
</body>
</html>
