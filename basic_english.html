<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spoken Hub - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .header { padding: 25px 20px 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(255, 255, 255, 0.1); color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .back-btn { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .m-title { font-family: 'Outfit'; font-size: 22px; font-weight: 800; margin: 0; }
        .m-sub { font-size: 12px; color: #a7f3d0; margin-top: 2px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}

        .container { padding: 20px; position: relative; z-index: 10; max-width: 800px; margin: 0 auto; }
        .section-title { font-size: 14px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 1px; margin: 30px 0 15px; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .module-card { background: white; border-radius: 20px; padding: 20px; text-decoration: none; color: #0f172a; display: flex; flex-direction: column; align-items: center; text-align: center; border: 1px solid #e2e8f0; box-shadow: 0 5px 15px rgba(0,0,0,0.03); cursor: pointer; transition: 0.2s; }
        .module-card:active { transform: scale(0.96); }
        .mc-icon { width: 50px; height: 50px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 12px; }
        .mc-title { font-family: 'Outfit'; font-size: 16px; font-weight: 800; margin: 0 0 5px; }
        .mc-sub { font-size: 12px; color: #64748b; font-weight: 600; }
        .module-card.done { background: #f0fdf4; border-color: #10b981; }

        /* FULL PAGE OVERLAYS */
        .full-page-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #ffffff; z-index: 3000; display: none; flex-direction: column; overflow: hidden; animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { 0% { transform: translateX(100%); } 100% { transform: translateX(0); } }

        .screen-header { padding: 20px 25px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .screen-header h2 { margin: 0; font-family: 'Outfit'; font-size: 20px; font-weight: 800; color: #1e293b; display: flex; align-items: center; }
        .close-screen-btn { background: white; border: 1px solid #cbd5e1; color: #64748b; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .close-screen-btn:active { transform: scale(0.9); }

        .screen-content { padding: 30px 25px; overflow-y: auto; flex-grow: 1; background: white; color: #334155; line-height: 1.8; font-size: 16px; }
        
        .action-row-btns { padding: 20px; border-top: 1px solid #e2e8f0; background: #f8fafc; display: flex; gap: 10px; }
        .primary-btn { flex: 2; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; font-family: 'Outfit'; cursor: pointer; box-shadow: 0 10px 25px rgba(16,185,129,0.3); transition: 0.2s; }
        .secondary-btn { flex: 1; background: #1e293b; color: white; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; font-family: 'Outfit'; cursor: pointer; transition: 0.2s; }

        /* VOICE LAB UI */
        #game-area { padding: 25px; text-align: center; }
        #eng-bn-text { font-size: 18px; font-weight: 700; color: #1e293b; line-height: 1.5; margin-bottom: 30px; }
        #drop-zone { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 40px; min-height: 50px; }
        #word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .word-btn { background: #f1f5f9; border: 2px solid #cbd5e1; padding: 12px 18px; border-radius: 12px; font-size: 16px; font-family: inherit; font-weight: 700; color: #334155; cursor: pointer; transition: 0.2s; }
        .word-btn.hidden { opacity: 0; pointer-events: none; }
        .word-slot { background: #3b82f6; color: white; padding: 12px 18px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 10px rgba(59,130,246,0.3); animation: popIn 0.2s; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div>
            <h1 class="m-title">Spoken Hub</h1>
            <div class="m-sub">Real-Life Scenarios</div>
        </div>
    </div>

    <div class="container fade-in" id="modules-container">
        </div>

    <div id="theory-overlay" class="full-page-screen">
        <div class="screen-header">
            <h2 id="theory-title">Module</h2>
            <button onclick="closeOverlay('theory-overlay')" class="close-screen-btn"><i class="fas fa-times"></i></button>
        </div>
        <div class="screen-content" id="theory-content"></div>
        <div class="action-row-btns">
            <button class="secondary-btn" onclick="triggerAIRoleplay()"><i class="fas fa-robot"></i> Roleplay</button>
            <button class="primary-btn" onclick="startPractice()">Voice Lab <i class="fas fa-microphone-alt"></i></button>
        </div>
    </div>

    <div id="game-overlay" class="full-page-screen">
        <div class="screen-header">
            <h2 style="color:#ef4444;"><i class="fas fa-microphone-alt"></i> Voice Lab</h2>
            <button onclick="closeOverlay('game-overlay')" class="close-screen-btn" style="color:#ef4444; border-color:#fca5a5;"><i class="fas fa-times"></i></button>
        </div>
        <div class="screen-content" style="background:#f8fafc;">
            <div id="game-area">
                <div id="eng-bn-text">Loading...</div>
                <div id="drop-zone"></div>
                <div id="word-bank"></div>
            </div>
            
            <div id="success-area" style="display:none; flex-direction:column; align-items:center; background:white; padding:25px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05); margin-top:30px; border:1px solid #10b981;">
                <i class="fas fa-check-circle" style="font-size:50px; color:#10b981; margin-bottom:15px;"></i>
                <h3 style="margin:0 0 10px; font-family:'Outfit'; color:#1e293b;">Perfect!</h3>
                <div id="eng-explanation" style="font-size:14px; color:#475569; margin-bottom:20px;"></div>
                <button onclick="nextQuestion()" style="background:#10b981; color:white; border:none; padding:15px 30px; border-radius:50px; font-weight:800; font-family:'Outfit'; font-size:16px; cursor:pointer;">Next <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>
    </div>

    <script src="basic-db.js"></script>
    <script src="basic-engine.js"></script>
    <script src="ai-database.js"></script>
    <script src="global-engine.js"></script> 
</body>
</html>
