<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Simulator - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --text: #f8fafc; --accent: #60a5fa; --danger: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }

        .header { padding: 20px; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(96, 165, 250, 0.2); }
        .back-btn { color: white; text-decoration: none; font-size: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .back-btn:active { transform: scale(0.9); }
        .m-title { font-family: 'Outfit'; font-size: 22px; font-weight: 800; color: var(--accent); margin: 0; }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; text-align: center; }
        
        /* TIMER UI */
        .timer-display { font-family: 'Outfit'; font-size: 60px; font-weight: 800; color: white; margin: 20px 0; text-shadow: 0 0 20px rgba(96, 165, 250, 0.4); }
        .timer-display.warning { color: var(--danger); text-shadow: 0 0 20px rgba(239, 68, 68, 0.4); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* CONTROLS */
        .controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
        .btn { padding: 12px 25px; border-radius: 50px; border: none; font-family: 'Outfit'; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; color: white; }
        .btn-start { background: var(--accent); box-shadow: 0 5px 15px rgba(96, 165, 250, 0.3); }
        .btn-start:active { transform: scale(0.95); }
        .btn-next { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .btn-next:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }

        /* CUE CARD */
        .cue-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px 20px; text-align: left; min-height: 250px; }
        .tag { display: inline-block; background: rgba(96, 165, 250, 0.1); color: var(--accent); padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .prompt-title { font-size: 18px; font-weight: 700; margin: 0 0 15px 0; color: #f8fafc; line-height: 1.4; }
        .prompt-bullets { margin: 0; padding-left: 20px; color: #cbd5e1; font-size: 15px; line-height: 1.8; }
        .prompt-bullets li { margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="adv_english.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1 class="m-title">Test Pro</h1>
        <div style="width: 40px;"></div>
    </div>

    <div class="container">
        <div class="timer-display" id="timer">02:00</div>
        
        <div class="controls">
            <button class="btn btn-start" id="startBtn"><i class="fas fa-play"></i> Start Timer</button>
            <button class="btn btn-next" id="nextBtn"><i class="fas fa-random"></i> Next Prompt</button>
        </div>

        <div class="cue-card" id="cueCard">
            </div>
    </div>

    <script src="test-db.js"></script>
</body>
</html>
