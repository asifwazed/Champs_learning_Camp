<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Grammar Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }

        /* GLASSMORPHISM HEADER */
        .header { padding: 25px 20px 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(255, 255, 255, 0.1); color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .back-btn { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .m-title { font-family: 'Outfit'; font-size: 22px; font-weight: 800; margin: 0; }
        .m-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px;}

        .container { padding: 20px; position: relative; z-index: 60; }
        .section-title { font-size: 13px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 1px; margin: 30px 0 15px; display: flex; align-items: center; gap: 8px; }

        /* LESSON CARDS (Beautifully Listed) */
        .lesson-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); cursor: pointer; border: 2px solid transparent; transition: 0.3s; position: relative; overflow: hidden; }
        .lesson-card:active { transform: scale(0.97); }
        
        .l-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; transition: 0.3s; }
        .l-info h3 { margin: 0; font-family: 'Outfit'; font-size: 16px; font-weight: 800; color: #1e293b; transition: 0.3s; }
        .l-info p { margin: 3px 0 0; font-size: 12px; color: #64748b; font-weight: 500; transition: 0.3s; }
        .status-icon { margin-left: auto; font-size: 18px; color: #cbd5e1; transition: 0.3s; }

        /* Completed State (Tick Mark) */
        .lesson-card.done { background: #f0fdf4; border-color: #10b981; box-shadow: 0 5px 20px rgba(16,185,129,0.1); }
        .lesson-card.done .l-info h3 { color: #065f46; }
        .lesson-card.done .l-info p { color: #10b981; font-weight: 700; }
        
        /* Overlays */
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Quiz Buttons */
        .opt-btn-new { background: white; color: #334155; border: 2px solid #e2e8f0; padding: 16px 20px; border-radius: 14px; font-size: 15px; font-weight: 700; width: 100%; text-align: left; cursor: pointer; transition: 0.2s; font-family: inherit; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .opt-btn-new:active { transform: scale(0.98); }
        .opt-btn-new.correct { background: #ecfdf5; border-color: #10b981; color: #065f46; font-weight: 800; }
        .opt-btn-new.wrong { background: #fef2f2; border-color: #ef4444; color: #991b1b; font-weight: 800; }
        
        /* Utility Classes */
        .magnet-element { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .magnet-element:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn magnet-element"><i class="fas fa-arrow-left"></i></a>
        <div>
            <h1 class="m-title">Grammar Matrix</h1>
            <div class="m-sub">100 Core Mechanics</div>
        </div>
    </div>

    <div class="container" id="matrix-container">
        <div style="text-align:center; padding:50px 20px; color:#94a3b8;">
            <i class="fas fa-circle-notch fa-spin" style="font-size:30px; margin-bottom:15px; color:#3b82f6;"></i>
            <div>Loading modules...</div>
        </div>
    </div> 

    <div id="theory-overlay" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.85); backdrop-filter:blur(8px); z-index:2000; align-items:flex-end; justify-content:center; animation: fadeIn 0.2s;">
        <div style="background:#ffffff; width:100%; max-width:600px; height:85vh; border-radius:24px 24px 0 0; display:flex; flex-direction:column; box-shadow:0 -10px 40px rgba(0,0,0,0.5); animation:slideUp 0.3s ease-out; overflow: hidden;">
            <div style="padding:20px 25px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; background:#f8fafc;">
                <h2 id="theory-title" style="margin:0; font-family:'Outfit'; color:#1e293b; font-size:22px; font-weight:800;">Module Title</h2>
                <button onclick="MatrixEngine.closeOverlay('theory-overlay')" style="background:rgba(15,23,42,0.05); border:none; color:#64748b; width:35px; height:35px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;"><i class="fas fa-times"></i></button>
            </div>
            
            <div id="theory-content" style="padding:25px; overflow-y:auto; flex-grow:1; color:#334155; line-height:1.8; font-size:16px;"></div>
            
            <div style="padding:20px; border-top:1px solid #e2e8f0; background:#f8fafc;">
                <button onclick="MatrixEngine.startRapidFire()" class="magnet-element" style="width:100%; padding:18px; background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; border:none; border-radius:16px; font-size:17px; font-weight:800; font-family:'Outfit'; cursor:pointer; box-shadow:0 10px 25px rgba(59,130,246,0.3);">Take Module Exam <i class="fas fa-bolt" style="margin-left:5px;"></i></button>
            </div>
        </div>
    </div>

    <div id="quiz-overlay" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.95); backdrop-filter:blur(10px); z-index:2005; align-items:center; justify-content:center; padding:20px; animation: fadeIn 0.2s;">
        <div style="background:#ffffff; width:100%; max-width:500px; border-radius:24px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,0.5); animation:popIn 0.3s ease-out;">
            <div style="padding:20px 25px; background:#f8fafc; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
                <span class="overlay-title" style="font-family:'Outfit'; font-weight:800; color:#3b82f6; font-size:18px;"><i class="fas fa-gamepad"></i> Module Exam</span>
                <button onclick="MatrixEngine.closeOverlay('quiz-overlay')" style="background:none; border:none; color:#ef4444; font-size:22px; cursor:pointer;"><i class="fas fa-times-circle"></i></button>
            </div>
            
            <div style="padding:25px; overflow-y:auto; max-height:65vh;">
                <div id="quiz-progress" style="font-size:13px; color:#10b981; font-weight:800; letter-spacing:1px; margin-bottom:15px; text-transform:uppercase;"></div>
                <div id="quiz-question" style="font-size:19px; font-weight:700; color:#1e293b; margin-bottom:25px; line-height:1.5;"></div>
                <div id="options-container" style="display:flex; flex-direction:column; gap:12px;"></div>
                
                <div id="quiz-explanation" style="display:none; margin-top:20px; padding:15px 20px; background:#f0f9ff; border-left:4px solid #3b82f6; border-radius:12px; font-size:15px; color:#1e40af; line-height:1.6;"></div>
            </div>
            
            <div style="padding:20px; background:#f8fafc; border-top:1px solid #e2e8f0;">
                <button id="next-q-btn" class="magnet-element" onclick="MatrixEngine.nextQuizQuestion()" style="display:none; width:100%; padding:18px; border:none; border-radius:14px; font-weight:800; font-size:16px; cursor:pointer; font-family:'Outfit'; color:white;"></button>
            </div>
        </div>
    </div>

    <script src="grammar_matrix_db.js"></script>
    <script src="grammar_matrix_engine.js"></script>
    <script src="global-engine.js"></script> 
</body>
</html>
