<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Grammar Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; overflow-x: hidden; }

        .header { padding: 25px 20px 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(255, 255, 255, 0.1); color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .back-btn { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .m-title { font-family: 'Outfit'; font-size: 22px; font-weight: 800; margin: 0; }
        .m-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px;}

        .container { padding: 20px; position: relative; z-index: 10; max-width: 800px; margin: 0 auto; }
        .section-title { font-size: 14px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 1px; margin: 30px 0 15px; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }

        /* Premium Listed Cards */
        .lesson-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .lesson-card:active { transform: scale(0.97); }
        
        .l-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; transition: 0.3s; }
        .l-info h3 { margin: 0; font-family: 'Outfit'; font-size: 16px; font-weight: 800; color: #1e293b; }
        .l-info p { margin: 3px 0 0; font-size: 12px; color: #64748b; font-weight: 500; }
        .status-icon { margin-left: auto; font-size: 18px; color: #cbd5e1; }

        .lesson-card.done { background: #f0fdf4; border-color: #10b981; box-shadow: 0 5px 20px rgba(16,185,129,0.1); }
        .lesson-card.done .l-info h3 { color: #065f46; }
        .lesson-card.done .l-info p { color: #10b981; font-weight: 700; }

        /* FULL PAGE SCREENS (No more floating boxes) */
        .full-page-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #ffffff; z-index: 3000; display: none; flex-direction: column; overflow: hidden; animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { 0% { transform: translateX(100%); } 100% { transform: translateX(0); } }

        .screen-header { padding: 20px 25px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .screen-header h2 { margin: 0; font-family: 'Outfit'; font-size: 20px; font-weight: 800; color: #1e293b; }
        .close-screen-btn { background: white; border: 1px solid #cbd5e1; color: #64748b; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .close-screen-btn:active { transform: scale(0.9); background: #e2e8f0; }

        .screen-content { padding: 30px 25px; overflow-y: auto; flex-grow: 1; background: white; color: #334155; line-height: 1.8; font-size: 16px; }
        .screen-footer { padding: 20px; border-top: 1px solid #e2e8f0; background: #f8fafc; }

        /* Exam UI */
        .opt-btn-new { background: #f8fafc; color: #334155; border: 2px solid #e2e8f0; padding: 15px 20px; border-radius: 12px; font-size: 15px; font-weight: 600; width: 100%; text-align: left; cursor: pointer; transition: 0.2s; font-family: inherit; margin-bottom: 8px;}
        .opt-btn-new:active { transform: scale(0.98); }
        .opt-btn-new.correct { background: #ecfdf5; border-color: #10b981; color: #065f46; font-weight: 800; }
        .opt-btn-new.wrong { background: #fef2f2; border-color: #ef4444; color: #991b1b; font-weight: 800; }
        
        .magnet-element { transition: transform 0.2s; }
        .magnet-element:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn magnet-element"><i class="fas fa-arrow-left"></i></a>
        <div>
            <h1 class="m-title">Grammar Matrix</h1>
            <div class="m-sub">100 Core Mechanics</div>
        </div>
    </div>

    <div class="container" id="matrix-container"></div> 

    <div id="theory-overlay" class="full-page-screen">
        <div class="screen-header">
            <h2 id="theory-title">Module Title</h2>
            <button onclick="MatrixEngine.closeOverlay('theory-overlay')" class="close-screen-btn"><i class="fas fa-times"></i></button>
        </div>
        <div class="screen-content" id="theory-content"></div>
        <div class="screen-footer">
            <button onclick="MatrixEngine.startRapidFire()" class="magnet-element" style="width:100%; padding:20px; background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; border:none; border-radius:16px; font-size:18px; font-weight:800; font-family:'Outfit'; cursor:pointer; box-shadow:0 10px 25px rgba(59,130,246,0.3);">Take Exam <i class="fas fa-pen-alt" style="margin-left:5px;"></i></button>
        </div>
    </div>

    <div id="quiz-overlay" class="full-page-screen">
        <div class="screen-header">
            <h2 style="color:#3b82f6;"><i class="fas fa-pen-alt"></i> Module Exam</h2>
            <button onclick="MatrixEngine.closeOverlay('quiz-overlay')" class="close-screen-btn" style="color:#ef4444; border-color:#fca5a5;"><i class="fas fa-times"></i></button>
        </div>
        <div class="screen-content" id="quiz-questions-container" style="background:#f8fafc;"></div>
        <div class="screen-footer">
            <button class="magnet-element" onclick="MatrixEngine.finishExam()" style="width:100%; padding:20px; background:linear-gradient(135deg, #10b981, #059669); color:white; border:none; border-radius:16px; font-weight:800; font-size:18px; cursor:pointer; font-family:'Outfit'; box-shadow:0 10px 25px rgba(16, 185, 129, 0.3);">Submit & Finish <i class="fas fa-check-circle" style="margin-left:5px;"></i></button>
        </div>
    </div>

    <script src="grammar_matrix_db.js"></script>
    <script src="grammar_matrix_engine.js"></script>
    <script src="ai-database.js"></script>
    <script src="global-engine.js"></script> 
</body>
</html>
