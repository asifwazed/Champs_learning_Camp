<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grammar Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* DUAL THEME */
        :root { 
            --bg: #09090b; --card-bg: rgba(255, 255, 255, 0.03); --text-main: #f8fafc; 
            --text-sub: #94a3b8; --pink: #ec4899; --cyan: #06b6d4; 
            --header-bg: rgba(9, 9, 11, 0.85); --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.5); --overlay-bg: #09090b;
        }
        body.light-mode {
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #0f172a; 
            --text-sub: #475569; --pink: #ec4899; --cyan: #0ea5e9; 
            --header-bg: rgba(255, 255, 255, 0.85); --border-color: #e2e8f0;
            --input-bg: #f1f5f9; --overlay-bg: #f8fafc;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; transition: background-color 0.4s, color 0.4s; overflow-x: hidden; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .header { padding: 25px 20px 20px; background: var(--header-bg); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: 0.4s;}
        .back-btn { color: var(--text-main); text-decoration: none; font-size: 18px; background: var(--input-bg); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); transition: 0.2s;}
        .back-btn:active { transform: scale(0.9); }
        
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .section-title { font-family: 'Outfit'; font-size: 14px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1.5px; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }

        .magnet-element { transition: transform 0.2s ease; cursor: pointer; }
        .magnet-element:active { transform: scale(0.97) !important; }

        /* LIST CARDS */
        .magnet-card { background: var(--card-bg); border-radius: 20px; padding: 15px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; display: flex; align-items: center; gap: 15px; transition: 0.3s; backdrop-filter: blur(10px); }
        .card-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .card-content { flex-grow: 1; }
        .card-title { font-family: 'Outfit'; font-size: 16px; font-weight: 800; margin: 0 0 5px; color: var(--text-main); }
        .card-desc { font-size: 12px; color: var(--text-sub); margin: 0; font-weight: 600; }
        .status-icon { font-size: 18px; }

        /* FULL SCREEN OVERLAYS */
        .overlay { position: fixed; inset: 0; background: var(--overlay-bg); z-index: 3000; display: none; flex-direction: column; animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes popIn { 0% { opacity: 0; transform: translateY(50px); } 100% { opacity: 1; transform: translateY(0); } }
        
        .overlay-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); background: var(--header-bg); backdrop-filter: blur(10px); }
        .overlay-title { font-family: 'Outfit'; font-size: 18px; font-weight: 800; color: var(--cyan); margin: 0; flex-grow: 1; text-align: center; }
        .overlay-body { padding: 20px; overflow-y: auto; flex-grow: 1; }

        /* QUIZ BUTTONS */
        .opt-btn-new { display: block; width: 100%; text-align: left; padding: 15px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 10px; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--text-main); cursor: pointer; transition: 0.2s; }
        .opt-btn-new.correct { background: rgba(16, 185, 129, 0.1) !important; border-color: #10b981 !important; color: #10b981 !important; font-weight: 800; }
        .opt-btn-new.wrong { background: rgba(239, 68, 68, 0.1) !important; border-color: #ef4444 !important; color: #ef4444 !important; font-weight: 800; }
        
        .start-btn { width: 100%; background: linear-gradient(135deg, var(--pink), var(--cyan)); color: white; border: none; padding: 20px; border-radius: 16px; font-weight: 800; font-size: 18px; font-family: 'Outfit'; cursor: pointer; box-shadow: 0 10px 25px rgba(6, 182, 212, 0.4); margin-top: 20px; }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('champTheme') === 'light') { document.body.classList.add('light-mode'); }</script>

    <div class="header">
        <a href="index.html" class="back-btn magnet-element"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align:right;">
            <h1 style="margin:0; font-family:'Outfit'; font-size:18px; color:var(--text-main);">Grammar Matrix</h1>
            <div style="font-size:11px; color:var(--pink); font-weight:800; text-transform:uppercase; letter-spacing:1.5px;">100 Core Mechanics</div>
        </div>
    </div>

    <div class="container" id="matrix-container">
        <div style="text-align:center; padding:40px; color:var(--cyan);"><i class="fas fa-circle-notch fa-spin" style="font-size: 30px;"></i></div>
    </div>

    <div class="overlay" id="theory-overlay">
        <div class="overlay-header">
            <button onclick="MatrixEngine.closeOverlay('theory-overlay')" class="back-btn magnet-element"><i class="fas fa-times"></i></button>
            <h2 class="overlay-title" id="theory-title">Module Theory</h2>
            <div style="width:40px;"></div>
        </div>
        <div class="overlay-body">
            <div id="theory-content" style="font-size: 16px; line-height: 1.7; color: var(--text-main);"></div>
            <button class="start-btn magnet-element" onclick="MatrixEngine.startRapidFire()"><i class="fas fa-bolt"></i> Start Rapid Fire Quiz</button>
        </div>
    </div>

    <div class="overlay" id="quiz-overlay">
        <div class="overlay-header">
            <button onclick="MatrixEngine.closeOverlay('quiz-overlay')" class="back-btn magnet-element"><i class="fas fa-times"></i></button>
            <h2 class="overlay-title" style="color:var(--pink);">Rapid Fire Exam</h2>
            <div style="width:40px;"></div>
        </div>
        <div class="overlay-body">
            <div id="quiz-questions-container"></div>
            <button class="start-btn magnet-element" onclick="MatrixEngine.finishExam()" style="display:none;" id="finish-btn"><i class="fas fa-flag-checkered"></i> Finish & Save Progress</button>
        </div>
    </div>

    <script src="grammar_matrix_db.js"></script>
    <script src="grammar_matrix_engine.js"></script>
    <script src="global-engine.js"></script>
</body>
</html>
