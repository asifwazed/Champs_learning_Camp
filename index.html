<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Champ's Learning Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; } /* 120px prevents buttons from blocking! */
        
        .header { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; padding: 30px 24px 40px; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.3); position: relative; z-index: 50; }
        .m-title { font-family: 'Outfit'; font-size: 26px; font-weight: 800; margin: 0; text-align: center; color: white; }
        .m-sub { font-size: 13px; color: #94a3b8; margin-top: 5px; font-weight: 600; text-align: center; }
        
        .container { padding: 0 20px; margin-top: -20px; position: relative; z-index: 60; }
        .section-title { font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1.5px; margin: 30px 0 15px; display: flex; align-items: center; gap: 8px; }
        
        .nav-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.04); text-decoration: none; color: inherit; transition: 0.2s; border: 1px solid white; cursor: pointer; }
        .nav-card:active { transform: scale(0.97); border-color: #3b82f6; }
        .nc-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .nc-info h3 { margin: 0; font-family: 'Outfit'; font-size: 17px; font-weight: 700; color: #1e293b; }
        .nc-info p { margin: 3px 0 0; font-size: 12px; color: #64748b; font-weight: 500; }
    </style>
</head>
<body>
    <div id="app-root"></div>
    <script src="index-engine.js"></script>
    <script src="global-engine.js"></script>
</body>
</html>
