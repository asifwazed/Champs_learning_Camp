<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Profile - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; overflow-x: hidden; }

        /* HEADER */
        .header { padding: 30px 20px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .back-btn { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.05); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .back-btn:active { transform: scale(0.9); }
        
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .fade-in { animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        /* XP RING & AVATAR */
        .profile-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 30px; padding: 40px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative; overflow: hidden; margin-bottom: 25px; }
        .profile-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 60%); z-index: 0; pointer-events: none; }
        
        .avatar-ring { width: 140px; height: 140px; border-radius: 50%; margin: 0 auto 20px; position: relative; z-index: 2; padding: 6px; background: conic-gradient(from 0deg, #38bdf8, #8b5cf6, #ec4899, #38bdf8); animation: spinRing 4s linear infinite; }
        @keyframes spinRing { 100% { transform: rotate(360deg); } }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; background: #1e293b; object-fit: cover; border: 4px solid #0f172a; animation: counterSpin 4s linear infinite; }
        @keyframes counterSpin { 100% { transform: rotate(-360deg); } }

        .rank-badge { position: absolute; bottom: -5px; right: 10px; background: #f59e0b; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 4px solid #0f172a; z-index: 3; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4); }

        .username { font-family: 'Outfit'; font-size: 28px; font-weight: 800; color: white; margin: 0 0 5px; position: relative; z-index: 2; }
        .total-xp { font-size: 16px; color: #38bdf8; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; position: relative; z-index: 2; }

        /* STATS GRID */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-val { font-family: 'Outfit'; font-size: 32px; font-weight: 800; color: white; margin-bottom: 5px; }
        .stat-label { font-size: 12px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* ACHIEVEMENTS / BADGES */
        .section-title { font-family: 'Outfit'; font-size: 16px; font-weight: 800; color: #cbd5e1; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 20px; }
        .badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .badge-slot { background: rgba(255,255,255,0.02); aspect-ratio: 1; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px dashed rgba(255,255,255,0.1); opacity: 0.4; transition: 0.4s; position: relative; }
        .badge-slot i { font-size: 28px; color: #64748b; margin-bottom: 5px; }
        .badge-slot span { font-size: 9px; font-weight: 800; text-transform: uppercase; text-align: center; }
        
        /* Unlocked Badges */
        .badge-slot.unlocked { opacity: 1; border-style: solid; background: rgba(255,255,255,0.05); }
        .badge-slot.unlocked.b-fire { border-color: #ef4444; color: #ef4444; box-shadow: inset 0 0 20px rgba(239,68,68,0.1); }
        .badge-slot.unlocked.b-fire i { color: #ef4444; text-shadow: 0 0 10px rgba(239,68,68,0.5); }
        
        .badge-slot.unlocked.b-matrix { border-color: #ec4899; color: #ec4899; box-shadow: inset 0 0 20px rgba(236,72,153,0.1); }
        .badge-slot.unlocked.b-matrix i { color: #ec4899; text-shadow: 0 0 10px rgba(236,72,153,0.5); }

        .badge-slot.unlocked.b-mic { border-color: #10b981; color: #10b981; box-shadow: inset 0 0 20px rgba(16,185,129,0.1); }
        .badge-slot.unlocked.b-mic i { color: #10b981; text-shadow: 0 0 10px rgba(16,185,129,0.5); }

        .badge-slot.unlocked.b-vocab { border-color: #f59e0b; color: #f59e0b; box-shadow: inset 0 0 20px rgba(245,158,11,0.1); }
        .badge-slot.unlocked.b-vocab i { color: #f59e0b; text-shadow: 0 0 10px rgba(245,158,11,0.5); }

    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-family:'Outfit'; font-size:20px; color:white;">Player Profile</h2>
        <div style="width:45px;"></div>
    </div>

    <div class="container fade-in">
        
        <div class="profile-card">
            <div class="avatar-ring">
                <img src="https://cdn-icons-png.flaticon.com/512/3176/3176294.png" id="profile-avatar" class="avatar-img">
                <div class="rank-badge" id="rank-icon"><i class="fas fa-star"></i></div>
            </div>
            <h2 class="username">Champ</h2>
            <div class="total-xp" id="xp-display">0 XP TOTAL</div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-val" id="stat-streak" style="color: #ef4444;">0</div>
                <div class="stat-label">Day Streak <i class="fas fa-fire" style="color:#ef4444;"></i></div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="stat-grammar" style="color: #ec4899;">0</div>
                <div class="stat-label">Matrix Rules</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="stat-spoken" style="color: #10b981;">0</div>
                <div class="stat-label">Spoken Scenarios</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="stat-vocab" style="color: #f59e0b;">0</div>
                <div class="stat-label">Vocab High Score</div>
            </div>
        </div>

        <h3 class="section-title">Mastery Badges</h3>
        <div class="badge-grid">
            <div class="badge-slot b-fire" id="badge-streak">
                <i class="fas fa-fire-alt"></i>
                <span>3-Day Streak</span>
            </div>
            <div class="badge-slot b-matrix" id="badge-matrix">
                <i class="fas fa-layer-group"></i>
                <span>Matrix God</span>
            </div>
            <div class="badge-slot b-mic" id="badge-spoken">
                <i class="fas fa-microphone-alt"></i>
                <span>Fluent Native</span>
            </div>
            <div class="badge-slot b-vocab" id="badge-vocab">
                <i class="fas fa-bolt"></i>
                <span>Vocab Beast</span>
            </div>
        </div>

    </div>

    <script src="profile-engine.js"></script>
    <script src="global-engine.js"></script>
    <script src="ai-database.js"></script>
</body>
</html>
