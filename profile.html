<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .header { padding: 25px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .back-btn { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.05); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        .profile-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 30px; padding: 40px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative; margin-bottom: 25px; }
        .avatar-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #3b82f6; background: white; margin-bottom: 15px; }
        .username { font-family: 'Outfit'; font-size: 28px; font-weight: 800; margin: 0 0 5px; }
        
        /* EDIT MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.8); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: white; width: 90%; max-width: 350px; border-radius: 24px; padding: 25px; position: relative; }
        .input-field { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 15px; outline: none; font-family: inherit; font-weight: 700; color: #1e293b; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0; font-family:'Outfit'; font-size:20px;">Your Profile</h2>
        <div style="width:40px;"></div>
    </div>

    <div class="container">
        <div class="profile-card">
            <button onclick="document.getElementById('edit-modal').style.display='flex'" style="position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.1); border:none; color:white; padding:8px 15px; border-radius:50px; cursor:pointer; font-weight:700;"><i class="fas fa-pen"></i> Edit</button>
            <img src="https://api.dicebear.com/7.x/initials/svg?seed=Champ&backgroundColor=3b82f6" id="display-avatar" class="avatar-img">
            <h2 class="username" id="display-name">Champ</h2>
            <div style="color:#94a3b8; font-size:14px; margin-bottom:5px; font-weight:600;" id="display-age">Age: Not set</div>
            <div style="color:#a7f3d0; font-size:14px; margin-bottom:15px; font-weight:700;" id="display-goal"><i class="fas fa-bullseye" style="color:#10b981;"></i> Goal: Not set</div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:20px; text-align:center; border:1px solid rgba(255,255,255,0.05);">
                <div style="font-size:30px; font-family:'Outfit'; font-weight:800; color:#ef4444;" id="stat-streak">0</div>
                <div style="font-size:12px; color:#94a3b8; font-weight:700; text-transform:uppercase;">Day Streak <i class="fas fa-fire"></i></div>
            </div>
            <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:20px; text-align:center; border:1px solid rgba(255,255,255,0.05);">
                <div style="font-size:30px; font-family:'Outfit'; font-weight:800; color:#3b82f6;" id="stat-modules">0</div>
                <div style="font-size:12px; color:#94a3b8; font-weight:700; text-transform:uppercase;">Modules Done <i class="fas fa-check-circle"></i></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-box">
            <button onclick="document.getElementById('edit-modal').style.display='none'" style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:20px; color:#64748b; cursor:pointer;"><i class="fas fa-times"></i></button>
            <h3 style="font-family:'Outfit'; color:#1e293b; margin:0 0 20px;">Edit Profile</h3>
            
            <input type="text" id="input-name" class="input-field" placeholder="Your Name">
            <input type="number" id="input-age" class="input-field" placeholder="Your Age">
            <input type="text" id="input-goal" class="input-field" placeholder="Your Goal (e.g., DU Admission)">
            
            <div style="margin-bottom:10px; font-weight:800; color:#1e293b; font-size:13px;">Avatar Color:</div>
            <select id="input-color" class="input-field">
                <option value="3b82f6">Blue</option>
                <option value="ef4444">Red</option>
                <option value="10b981">Green</option>
                <option value="f59e0b">Yellow</option>
            </select>

            <button onclick="saveProfileData()" style="width:100%; background:#3b82f6; color:white; border:none; padding:15px; border-radius:12px; font-weight:800; font-size:15px; cursor:pointer;">Save Profile</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const n = localStorage.getItem('champ_name') || 'Champ';
            const a = localStorage.getItem('champ_age') || 'Not set';
            const g = localStorage.getItem('champ_goal') || 'Not set';
            const c = localStorage.getItem('champ_color') || '3b82f6';

            document.getElementById('display-name').innerText = n;
            document.getElementById('display-age').innerText = 'Age: ' + a;
            document.getElementById('display-goal').innerHTML = '<i class="fas fa-bullseye" style="color:#10b981;"></i> Goal: ' + g;
            document.getElementById('display-avatar').src = `https://api.dicebear.com/7.x/initials/svg?seed=${n}&backgroundColor=${c}&textColor=ffffff`;

            let mods = 0;
            Object.keys(localStorage).forEach(key => { if(key.endsWith('_done') && localStorage.getItem(key) === 'true') mods++; });
            document.getElementById('stat-modules').innerText = mods;
            document.getElementById('stat-streak').innerText = localStorage.getItem('currentStreak') || 0;
        });

        function saveProfileData() {
            const n = document.getElementById('input-name').value.trim();
            const a = document.getElementById('input-age').value.trim();
            const g = document.getElementById('input-goal').value.trim();
            const c = document.getElementById('input-color').value;

            if(n) localStorage.setItem('champ_name', n);
            if(a) localStorage.setItem('champ_age', a);
            if(g) localStorage.setItem('champ_goal', g);
            localStorage.setItem('champ_color', c);
            
            location.reload();
        }
    </script>
</body>
</html>
