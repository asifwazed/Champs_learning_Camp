<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seen Text Vault - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* DUAL THEME SYSTEM */
        :root { 
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #e2e8f0; --text-sub: #94a3b8; 
            --pink: #f472b6; --cyan: #38bdf8; --header-bg: rgba(15, 23, 42, 0.9);
            --border-color: rgba(255, 255, 255, 0.08); --input-bg: #0f172a; --hover-bg: rgba(255,255,255,0.05);
        }
        body.light-mode {
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #334155; --text-sub: #64748b; 
            --pink: #ec4899; --cyan: #0284c7; --header-bg: rgba(248, 250, 252, 0.9);
            --border-color: #e2e8f0; --input-bg: #f1f5f9; --hover-bg: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; overflow-x: hidden; transition: 0.4s; }

        /* HEADER */
        .header { padding: 30px 20px 25px; background: var(--header-bg); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: 0.4s; }
        .back-btn { color: var(--text-main); text-decoration: none; font-size: 20px; background: var(--input-bg); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; border: 1px solid var(--border-color); }
        .back-btn:active { transform: scale(0.9); }
        .header-title-box { text-align: right; }
        .header-title { font-family: 'Outfit'; font-size: 20px; font-weight: 800; margin: 0; color: var(--cyan); }
        .header-sub { font-size: 11px; color: var(--pink); margin-top: 3px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .container { padding: 25px 20px; max-width: 800px; margin: 0 auto; }
        
        .magnet-element { transition: transform 0.2s ease; cursor: pointer; }
        .magnet-element:active { transform: scale(0.97) !important; }
        .fade-in { animation: slideUpFade 0.4s ease forwards; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        /* AI GLOW TIP */
        .highlight-tip { background: var(--card-bg); color: var(--text-main); padding: 18px 20px; border-radius: 20px; font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 15px; margin-bottom: 25px; border: 1px solid var(--border-color); box-shadow: 0 5px 15px rgba(0,0,0,0.05); line-height: 1.5; }
        .highlight-tip i { font-size: 24px; color: var(--cyan); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }

        /* DYNAMIC ACCORDION CARDS */
        .unit-card { background: var(--card-bg); border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border-color); overflow: hidden; transition: 0.3s; }
        .unit-header { padding: 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; position: relative; z-index: 2; transition: 0.2s; }
        .unit-header:active { background: var(--hover-bg); }
        
        .unit-icon { width: 55px; height: 55px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .unit-title { font-family: 'Outfit'; font-size: 17px; font-weight: 800; color: var(--text-main); margin: 0 0 3px; }
        .unit-sub { font-size: 12px; color: var(--text-sub); font-weight: 700; letter-spacing: 0.5px; }
        
        .chevron { color: var(--text-sub); font-size: 18px; transition: transform 0.3s ease; margin-left: auto; }
        .unit-card.active .chevron { transform: rotate(180deg); color: var(--cyan); }
        .unit-card.active { border-color: var(--cyan); }

        /* DROPDOWN LESSONS */
        .lesson-list { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: var(--input-bg); }
        .lesson-list-inner { padding: 5px 20px 20px; }
        
        .lesson-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: var(--card-bg); border-radius: 14px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border: 1px solid var(--border-color); text-decoration: none; transition: 0.2s; }
        .lesson-item:last-child { margin-bottom: 0; }
        .lesson-item:active { transform: scale(0.98); }
        
        .lesson-name { font-size: 14.5px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 10px; width: 70%; }
        .lesson-index { background: var(--input-bg); color: var(--cyan); width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; flex-shrink: 0; border: 1px solid var(--border-color); }
        .lesson-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .lesson-btn { background: var(--cyan); color: white; border: none; padding: 8px 16px; border-radius: 50px; font-size: 12px; font-weight: 800; font-family: 'Outfit'; display: flex; align-items: center; gap: 6px; }

        /* THEME COLORS */
        .c-purple { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }
        .c-teal { background: rgba(20, 184, 166, 0.1); color: #14b8a6; }
        .c-amber { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .c-rose { background: rgba(225, 29, 72, 0.1); color: #e11d48; }
        .c-blue { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .c-indigo { background: rgba(99, 102, 241, 0.1); color: #6366f1; }
        .c-green { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .c-pink { background: rgba(236, 72, 153, 0.1); color: #ec4899; }
        .c-orange { background: rgba(249, 115, 22, 0.1); color: #f97316; }
        .c-cyan { background: rgba(6, 182, 212, 0.1); color: #06b6d4; }
    </style>
</head>
<body>

    <script>
        if(localStorage.getItem('champTheme') === 'light') { document.body.classList.add('light-mode'); }
    </script>

    <div class="header">
        <a href="index.html" class="back-btn magnet-element"><i class="fas fa-arrow-left"></i></a>
        <div class="header-title-box">
            <h1 class="header-title">Seen Text Vault</h1>
            <div class="header-sub">Board Reading Engine</div>
        </div>
    </div>

    <div class="container fade-in">
    
        <div class="highlight-tip">
            <i class="fas fa-brain"></i>
            <div>
                <span style="color:var(--cyan);">Smart Reader Active:</span> 
                Tap any English sentence inside a lesson to instantly reveal its exact Bengali translation!
            </div>
        </div>

        <div id="dynamic-units-container">
            <div style="text-align:center; padding:40px; color:var(--cyan);">
                <i class="fas fa-circle-notch fa-spin" style="font-size:30px; margin-bottom:15px;"></i>
                <div style="font-weight:600;">Syncing with Database...</div>
            </div>
        </div>

    </div>

    <script src="database.js"></script>
    <script>
        const unitTitles = {
            1: "Making History", 2: "Traffic Education", 3: "Food Adulteration", 4: "Human Relationships",
            5: "Adolescence", 6: "Higher Education", 7: "Human Rights", 8: "Environment",
            9: "Myths & Lit", 10: "Dreams", 11: "Diaspora", 12: "Peace", 13: "Science",
            14: "Art and Music", 15: "Travels"
        };
        const unitThemes = ['c-purple', 'c-teal', 'c-amber', 'c-rose', 'c-blue', 'c-indigo', 'c-green', 'c-pink', 'c-orange', 'c-cyan'];
        const unitIcons = ['fa-globe-africa', 'fa-traffic-light', 'fa-hamburger', 'fa-heart', 'fa-user-graduate', 'fa-university', 'fa-hands-helping', 'fa-leaf', 'fa-book-open', 'fa-cloud-moon', 'fa-walking', 'fa-dove', 'fa-microchip', 'fa-music', 'fa-plane'];

        function initUnits() {
            let container = document.getElementById('dynamic-units-container');
            if(typeof unitData === 'undefined') {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--pink); font-weight:800;">Critical Error: database.js not found!</div>';
                return;
            }
            
            let unitsMap = {};
            // Scans your exact database to prevent missing lessons
            for(let key in unitData) {
                let match = key.match(/u(\d+)_l(\d+)/);
                if(match) {
                    let u = parseInt(match[1]);
                    let l = parseInt(match[2]);
                    if(!unitsMap[u]) unitsMap[u] = [];
                    unitsMap[u].push({ id: key, lNum: l, data: unitData[key] });
                }
            }
            
            let html = '';
            let sortedUnits = Object.keys(unitsMap).sort((a,b) => a - b);
            
            sortedUnits.forEach((uNum, idx) => {
                let title = unitTitles[uNum] || `Module ${uNum}`;
                let theme = unitThemes[idx % unitThemes.length];
                let icon = unitIcons[(uNum - 1) % unitIcons.length] || 'fa-book';
                let lessons = unitsMap[uNum].sort((a,b) => a.lNum - b.lNum);
                
                html += `
                <div class="unit-card" id="card-u${uNum}">
                    <div class="unit-header magnet-element" onclick="toggleUnit('u${uNum}')">
                        <div class="unit-icon ${theme}"><i class="fas ${icon}"></i></div>
                        <div style="flex-grow:1;">
                            <h3 class="unit-title">Unit ${uNum}: ${title}</h3>
                            <div class="unit-sub">${lessons.length} Lessons Loaded</div>
                        </div>
                        <i class="fas fa-chevron-down chevron"></i>
                    </div>
                    <div class="lesson-list" id="list-u${uNum}">
                        <div class="lesson-list-inner">`;
                        
                lessons.forEach(lesson => {
                    let split = (lesson.data.title || `Lesson ${lesson.lNum}`).split(': ');
                    let lName = split.length > 1 ? split[1] : split[0];
                    
                    html += `
                    <a href="lesson.html?unit=${lesson.id}" class="lesson-item magnet-element">
                        <div class="lesson-name">
                            <div class="lesson-index">${lesson.lNum}</div> 
                            <span class="lesson-text">${lName}</span>
                        </div>
                        <div class="lesson-btn"><i class="fas fa-book-reader"></i> Read</div>
                    </a>`;
                });
                
                html += `</div></div></div>`;
            });
            
            container.innerHTML = html;
        }

        function toggleUnit(id) {
            const card = document.getElementById('card-' + id);
            const list = document.getElementById('list-' + id);
            
            document.querySelectorAll('.unit-card.active').forEach(openCard => {
                if(openCard.id !== 'card-' + id) {
                    openCard.classList.remove('active');
                    openCard.querySelector('.lesson-list').style.maxHeight = null;
                }
            });

            if (card.classList.contains('active')) {
                card.classList.remove('active');
                list.style.maxHeight = null;
            } else {
                card.classList.add('active');
                list.style.maxHeight = list.scrollHeight + "px";
            }
        }

        window.onload = initUnits;
    </script>
    <script src="global-engine.js"></script>
</body>
</html>
