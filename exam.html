<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Board Exam - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* SCIENTIFIC EYE-CARE THEME */
        :root { 
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #e2e8f0; --text-sub: #94a3b8; 
            --pink: #f472b6; --cyan: #38bdf8; --header-bg: rgba(15, 23, 42, 0.9);
            --border-color: rgba(255, 255, 255, 0.08); --input-bg: #0f172a;
        }

        body.light-mode {
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #334155; --text-sub: #64748b; 
            --pink: #ec4899; --cyan: #0284c7; --header-bg: rgba(248, 250, 252, 0.9);
            --border-color: #e2e8f0; --input-bg: #f1f5f9;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; transition: 0.4s; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .header { padding: 25px 20px 20px; background: var(--header-bg); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: 0.4s; }
        .back-btn { color: var(--text-main); text-decoration: none; font-size: 18px; background: var(--input-bg); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); transition: 0.2s;}
        .back-btn:active { transform: scale(0.9); }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .exam-container { background: var(--card-bg); padding: 30px 20px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid var(--border-color); transition: 0.4s; }
        
        .fade-in { animation: slideUpFade 0.4s ease forwards; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        /* HSC Format Styles */
        .exam-section { margin-bottom: 40px; }
        .q-main-title { font-family: 'Outfit'; font-size: 17px; font-weight: 800; color: var(--cyan); margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; line-height: 1.4; display: flex; gap: 10px; align-items:flex-start;}
        
        .question-block { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px dashed var(--border-color); margin-left: 10px; }
        .question-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .q-title { font-size: 15.5px; font-weight: 700; color: var(--text-main); margin-bottom: 15px; line-height: 1.6; }
        
        /* 15 MCQ Buttons */
        .mcq-opt { display: block; width: 100%; text-align: left; padding: 15px 20px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 10px; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--text-main); cursor: pointer; transition: 0.2s; }
        .mcq-opt:active { transform: scale(0.98); }
        .mcq-opt.correct { background: rgba(16, 185, 129, 0.1) !important; border-color: #10b981 !important; color: #10b981 !important; font-weight: 800; }
        .mcq-opt.wrong { background: rgba(239, 68, 68, 0.1) !important; border-color: #ef4444 !important; color: #ef4444 !important; font-weight: 800; }
        
        /* Text Areas */
        .exam-textarea { width: 100%; padding: 18px; border-radius: 12px; border: 1px solid var(--border-color); outline: none; font-family: inherit; font-size: 15px; color: var(--text-main); resize: vertical; min-height: 120px; background: var(--input-bg); transition: 0.2s; font-weight: 500; line-height: 1.6; }
        .exam-textarea:focus { border-color: var(--cyan); }
        
        /* Flow Chart Boxes */
        .flow-box { border: 2px solid var(--cyan); padding: 15px; border-radius: 12px; font-weight: 600; font-size: 14px; text-align: center; margin-bottom: 5px; width: 100%; color: var(--text-main); }
        .flow-box.filled { background: rgba(56, 189, 248, 0.1); border-style: solid; }
        .flow-box.empty { background: var(--input-bg); outline: none; border-style: dashed; border-color: var(--text-sub); transition: 0.2s; }
        .flow-box.empty:focus { border-style: solid; border-color: var(--cyan); }
        
        /* WhatsApp Submit Button */
        .submit-wa-btn { width: 100%; background: linear-gradient(135deg, var(--pink), var(--cyan)); color: white; border: none; padding: 20px; border-radius: 16px; font-weight: 800; font-family: 'Outfit'; font-size: 17px; margin-top: 20px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: transform 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .submit-wa-btn:active { transform: scale(0.96); }

        .placeholder-badge { display: inline-block; background: rgba(236,72,153,0.1); color: var(--pink); border: 1px solid var(--pink); padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; margin-bottom: 15px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <script>
        if(localStorage.getItem('champTheme') === 'light') { document.body.classList.add('light-mode'); }
    </script>

    <div class="header">
        <a href="#" onclick="history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align:right;">
            <h1 style="margin:0; font-family:'Outfit'; font-size:18px; color:var(--text-main);" id="ui-title">Board Exam</h1>
            <div style="font-size:11px; color:var(--pink); font-weight:800; text-transform:uppercase; letter-spacing:1.5px;">HSC Format</div>
        </div>
    </div>

    <div class="container fade-in">
        <div class="exam-container" id="exam-content">
            <div style="text-align:center; padding:40px 20px; color:var(--cyan);">
                <i class="fas fa-circle-notch fa-spin" style="font-size:30px; margin-bottom:15px;"></i>
                <div>Loading Exam Framework...</div>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script>
        const ExamEngine = {
            score: 0,
            totalMcqs: 0,
            isPlaceholder: false,

            init: function() {
                try {
                    const urlParams = new URLSearchParams(window.location.search);
                    const unitId = urlParams.get('unit') || 'u1_l1'; 
                    let passageData = typeof unitData !== 'undefined' ? unitData[unitId] : null;
                    
                    let rawTitle = passageData ? (passageData.title || "Lesson Exam") : "Lesson Exam";
                    document.getElementById('ui-title').innerText = rawTitle;

                    // THE 15-MCQ AUTO INJECTOR
                    if(!passageData || !passageData.exam || !passageData.exam.mcqs || passageData.exam.mcqs.length === 0) {
                        this.isPlaceholder = true;
                        
                        let fakeExam = {
                            mcqs: Array.from({length: 15}, (_, i) => ({
                                q: `HSC Board Question ${String.fromCharCode(97 + i).toUpperCase()}: What is the most accurate interpretation based on the passage you just read?`,
                                options: ["Option I (Distractor)", "Option II (Incorrect)", "Option III (Correct Answer)", "Option IV (Irrelevant)"],
                                ans: 2
                            })),
                            openEnded: [
                                "What is the central theme or main idea of the passage?",
                                "Explain the significance of the events described by the author.",
                                "How does this lesson reflect the cultural or social reality of the time?",
                                "What conclusion can you draw from the author's tone in the last paragraph?"
                            ],
                            flowChartTopic: "the sequence of important events or key points from the passage",
                            flowChartBox1: "Introduction of the main concept"
                        };
                        this.renderExam(fakeExam);
                    } else {
                        this.renderExam(passageData.exam);
                    }

                } catch (error) {
                    console.error("Exam Engine Error: ", error);
                    document.getElementById('exam-content').innerHTML = `
                        <div style="text-align:center; padding:40px 20px;">
                            <i class="fas fa-exclamation-triangle" style="font-size:40px; color:var(--pink); margin-bottom:15px;"></i>
                            <h3 style="margin:0 0 10px; font-family:'Outfit'; color:var(--text-main);">Database Sync Issue</h3>
                            <p style="color:var(--text-sub); font-size:14px; margin:0;">There was an error compiling the exam data.</p>
                        </div>`;
                }
            },

            renderExam: function(examData) {
                let html = '';

                if(this.isPlaceholder) {
                    html += `<div style="text-align:center;"><div class="placeholder-badge"><i class="fas fa-hammer"></i> EXAM FORGE PREVIEW</div></div>
                             <p style="color:var(--text-sub); font-size:13px; text-align:center; margin-bottom:30px;">Asif is currently hand-crafting the specific questions for this lesson. Feel free to test the 15-MCQ framework below!</p>`;
                }

                // QUESTION 1: 15 MCQs
                if (examData.mcqs && examData.mcqs.length > 0) {
                    this.totalMcqs = examData.mcqs.length;
                    html += `<div class="exam-section">
                        <div class="q-main-title">
                            <div>1.</div>
                            <div>Choose the correct answer from the following alternatives: (1 x ${this.totalMcqs} = ${this.totalMcqs})</div>
                        </div>`;
                    
                    examData.mcqs.forEach((mcq, i) => {
                        let letter = String.fromCharCode(97 + i); // a, b, c, d...
                        html += `<div class="question-block">
                            <div class="q-title">${letter}) ${mcq.q}</div>`;
                        
                        let safeOptions = mcq.options || ["A", "B", "C", "D"];
                        safeOptions.forEach((opt, j) => {
                            let romanNum = ['i', 'ii', 'iii', 'iv', 'v', 'vi'][j] || (j+1);
                            html += `<button class="mcq-opt" id="mcq-${i}-${j}" onclick="ExamEngine.checkMcq(${i}, ${j}, ${mcq.ans})">${romanNum}. ${opt}</button>`;
                        });
                        html += `</div>`;
                    });
                    html += `</div>`;
                }

                // QUESTION 2: Open Ended
                if (examData.openEnded && examData.openEnded.length > 0) {
                    html += `<div class="exam-section">
                        <div class="q-main-title">
                            <div>2.</div>
                            <div>Answer the following questions based on the text:</div>
                        </div>`;
                    
                    examData.openEnded.forEach((q, i) => {
                        let letter = String.fromCharCode(97 + i); 
                        html += `<div class="question-block">
                            <div class="q-title">${letter}) ${q}</div>
                            <textarea class="exam-textarea open-ended-ans" placeholder="Write your detailed answer here..."></textarea>
                        </div>`;
                    });
                    html += `</div>`;
                }

                // QUESTION 3: Flow Chart
                if (examData.flowChartTopic) {
                    html += `<div class="exam-section">
                        <div class="q-main-title">
                            <div>3.</div>
                            <div>Based on your reading of the passage, make a short flow chart showing ${examData.flowChartTopic}. (1 is done for you)</div>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:8px; margin-left:10px;">
                            <div class="flow-box filled">1. ${examData.flowChartBox1}</div>`;
                    for(let i=2; i<=6; i++) {
                        html += `<div style="text-align:center; color:var(--text-sub);"><i class="fas fa-arrow-down"></i></div>
                                 <input type="text" class="flow-box empty flow-ans" placeholder="${i}. Type your point here...">`;
                    }
                    html += `</div></div>`;
                }

                // QUESTION 4: Summary
                html += `<div class="exam-section" style="margin-bottom: 10px;">
                    <div class="q-main-title">
                        <div>4.</div>
                        <div>Write a summary of the passage in your own words.</div>
                    </div>
                    <textarea class="exam-textarea summary-ans" style="height:150px; margin-left:10px; width:calc(100% - 10px);" placeholder="Start writing your summary here..."></textarea>
                </div>`;

                // WhatsApp Submit Button
                html += `<button class="submit-wa-btn" onclick="ExamEngine.submitToWhatsApp()"><i class="fab fa-whatsapp" style="font-size:22px;"></i> Submit Exam to Asif</button>`;

                document.getElementById('exam-content').innerHTML = html;
            },

            checkMcq: function(qIndex, selectedOpt, correctOpt) {
                let isFirstClick = false;
                for(let j=0; j<10; j++) { 
                    let btn = document.getElementById(`mcq-${qIndex}-${j}`);
                    if(!btn) continue;
                    if(!btn.disabled) isFirstClick = true; 
                    
                    btn.disabled = true;
                    btn.style.pointerEvents = 'none';
                    
                    if(j === correctOpt) {
                        btn.classList.add('correct');
                        btn.innerHTML += ' <i class="fas fa-check-circle" style="float:right;"></i>';
                    } else if (j === selectedOpt && j !== correctOpt) {
                        btn.classList.add('wrong');
                        btn.innerHTML += ' <i class="fas fa-times-circle" style="float:right;"></i>';
                    }
                }
                
                if(isFirstClick && selectedOpt === correctOpt) {
                    this.score++;
                }

                if(navigator.vibrate && localStorage.getItem('champSounds') !== 'false') {
                    navigator.vibrate(selectedOpt === correctOpt ? 20 : [50, 50, 50]);
                }
            },

            submitToWhatsApp: function() {
                let studentName = localStorage.getItem('champ_name') || "A Student";
                let examTitle = document.getElementById('ui-title').innerText;
                
                let msg = `🎓 *HSC Board Exam Submission*\n`;
                msg += `👤 *Name:* ${studentName}\n`;
                msg += `📖 *Topic:* ${examTitle}\n\n`;
                msg += `✅ *Q1. MCQ Score:* ${this.score} out of ${this.totalMcqs}\n\n`;
                
                let openEnded = document.querySelectorAll('.open-ended-ans');
                let flowBoxes = document.querySelectorAll('.flow-ans');
                let summary = document.querySelector('.summary-ans');
                
                let hasWrittenText = false;
                
                if(openEnded.length > 0) {
                    msg += `📝 *Q2. Written Answers:*\n`;
                    openEnded.forEach((ta, i) => {
                        if(ta.value.trim()) { 
                            let letter = String.fromCharCode(97 + i);
                            msg += `*${letter})* ${ta.value.trim()}\n\n`; 
                            hasWrittenText = true; 
                        }
                    });
                }
                
                if (flowBoxes.length > 0) {
                    msg += `📊 *Q3. Flow Chart:*\n`;
                    flowBoxes.forEach((fb, i) => {
                        if(fb.value.trim()) { msg += `Box ${i+2}: ${fb.value.trim()}\n`; hasWrittenText = true; }
                    });
                    msg += `\n`;
                }
                
                if (summary && summary.value.trim()) {
                    msg += `📑 *Q4. Summary:*\n${summary.value.trim()}\n`;
                    hasWrittenText = true;
                }

                if(!hasWrittenText) {
                    msg += `*(I have written my answers in my notebook and will send you a photo! 📸)*\n`;
                }

                let encoded = encodeURIComponent(msg);
                window.open(`https://wa.me/8801721149369?text=${encoded}`, '_blank');
            }
        };

        window.onload = () => ExamEngine.init();
    </script>
</body>
</html>
