<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSC Board Simulator - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #e2e8f0; --text-sub: #94a3b8; 
            --pink: #f472b6; --cyan: #38bdf8; --header-bg: rgba(15, 23, 42, 0.9);
            --border-color: rgba(255, 255, 255, 0.08); --input-bg: #0f172a;
            --success: #10b981; --danger: #ef4444;
        }
        body.light-mode {
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #334155; --text-sub: #64748b; 
            --pink: #ec4899; --cyan: #0284c7; --header-bg: rgba(248, 250, 252, 0.9);
            --border-color: #e2e8f0; --input-bg: #f1f5f9;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; transition: 0.4s; }
        .header { padding: 25px 20px; background: var(--header-bg); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border-color); }
        .back-btn { color: var(--text-main); text-decoration: none; width: 45px; height: 45px; background: var(--input-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); }
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .exam-section { margin-bottom: 40px; background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border-color); }
        .q-main-title { font-family: 'Outfit'; font-size: 18px; font-weight: 800; color: var(--cyan); margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .question-block { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px dashed var(--border-color); }
        .mcq-opt { display: block; width: 100%; text-align: left; padding: 16px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 14px; margin-bottom: 10px; color: var(--text-main); font-weight: 600; cursor: pointer; transition: 0.2s; }
        .mcq-opt.correct { background: rgba(16, 185, 129, 0.15) !important; border-color: var(--success); color: var(--success); }
        .mcq-opt.wrong { background: rgba(239, 68, 68, 0.15) !important; border-color: var(--danger); color: var(--danger); }
        .exam-textarea { width: 100%; padding: 15px; border-radius: 12px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); min-height: 100px; font-family: inherit; resize: none; outline: none; }
        .flow-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .flow-box { border: 2px solid var(--cyan); padding: 15px; border-radius: 12px; text-align: center; font-weight: 700; background: var(--input-bg); color: var(--text-main); width: 90%; }
        .submit-btn { width: 100%; background: linear-gradient(135deg, var(--pink), var(--cyan)); color: white; padding: 22px; border-radius: 18px; border: none; font-family: 'Outfit'; font-weight: 900; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('champTheme') === 'light') document.body.classList.add('light-mode');</script>
    <div class="header">
        <a href="units.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align:right;">
            <h1 style="margin:0; font-family:'Outfit'; font-size:18px;" id="ui-title">Board Exam</h1>
            <div id="score-counter" style="font-size:11px; color:var(--pink); font-weight:900; letter-spacing:1px;">SCORE: 0/15</div>
        </div>
    </div>

    <div class="container" id="exam-content"></div>

    <script src="database.js"></script>
    <script src="exam-db.js"></script>
    <script>
        const ExamEngine = {
            score: 0,
            init: function() {
                const urlParams = new URLSearchParams(window.location.search);
                const unitId = urlParams.get('unit') || 'u1_l1';
                const data = examDB[unitId];
                if(!data) return;

                document.getElementById('ui-title').innerText = unitData[unitId] ? unitData[unitId].title : "HSC Exam";
                this.render(data);
            },
            render: function(data) {
                let html = '';
                // 1. MCQS
                html += `<div class="exam-section"><div class="q-main-title">1. MCQ Section (1 x 15 = 15)</div>`;
                data.mcqs.forEach((m, i) => {
                    html += `<div class="question-block" id="mcq-block-${i}"><div style="font-weight:700; margin-bottom:12px;">${i+1}. ${m.q}</div>`;
                    m.options.forEach((opt, j) => {
                        html += `<button class="mcq-opt" onclick="ExamEngine.check(this, ${i}, ${j}, ${m.ans})">${opt}</button>`;
                    });
                    html += `</div>`;
                });
                html += `</div>`;

                // 2. OPEN ENDED
                html += `<div class="exam-section"><div class="q-main-title">2. Questions (2 x 5 = 10)</div>`;
                data.openEnded.forEach((q, i) => {
                    html += `<div class="question-block"><div>${String.fromCharCode(97+i)}) ${q}</div><textarea class="exam-textarea" style="margin-top:10px;" placeholder="Detailed answer..."></textarea></div>`;
                });
                html += `</div>`;

                // 3. FLOW CHART (6 Boxes)
                html += `<div class="exam-section"><div class="q-main-title">3. Flow Chart: ${data.flowChartTopic}</div><div class="flow-container">`;
                html += `<div class="flow-box">1. ${data.flowChartBox1}</div>`;
                for(let k=2; k<=6; k++) {
                    html += `<i class="fas fa-arrow-down" style="color:var(--cyan)"></i><input class="flow-box" placeholder="${k}. Type point here...">`;
                }
                html += `</div></div>`;

                // 4. SUMMARY
                html += `<div class="exam-section"><div class="q-main-title">4. Summary</div><textarea class="exam-textarea" style="min-height:180px;" placeholder="Write passage summary..."></textarea></div>`;
                
                html += `<button class="submit-btn" onclick="ExamEngine.submit()">Submit via WhatsApp</button>`;
                document.getElementById('exam-content').innerHTML = html;
            },
            check: function(btn, blockIdx, choiceIdx, correctIdx) {
                const block = document.getElementById(`mcq-block-${blockIdx}`);
                if(block.classList.contains('answered')) return;
                block.classList.add('answered');
                if(choiceIdx === correctIdx) { btn.classList.add('correct'); this.score++; }
                else { btn.classList.add('wrong'); block.querySelectorAll('.mcq-opt')[correctIdx].classList.add('correct'); }
                document.getElementById('score-counter').innerText = `SCORE: ${this.score}/15`;
            },
            submit: function() {
                const msg = `Exam Finished! Score: ${this.score}/15. Subject: ${document.getElementById('ui-title').innerText}`;
                window.open(`https://wa.me/8801721149369?text=${encodeURIComponent(msg)}`, '_blank');
            }
        };
        window.onload = () => ExamEngine.init();
    </script>
</body>
</html>
