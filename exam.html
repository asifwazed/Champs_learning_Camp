<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unit Exam - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* THE DUAL THEME SYSTEM */
        :root { 
            --bg: #09090b; 
            --card-bg: rgba(255, 255, 255, 0.03); 
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            --pink: #ec4899; 
            --cyan: #06b6d4; 
            --header-bg: rgba(9, 9, 11, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.5);
        }

        body.light-mode {
            --bg: #f8fafc; 
            --card-bg: rgba(255, 255, 255, 0.8); 
            --text-main: #0f172a; 
            --text-sub: #475569; 
            --pink: #ec4899; 
            --cyan: #0ea5e9; 
            --header-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.8);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; transition: background-color 0.5s ease, color 0.5s ease; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .header { padding: 25px 20px 20px; background: var(--header-bg); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: 0.5s; }
        .back-btn { color: var(--text-main); text-decoration: none; font-size: 18px; background: rgba(148, 163, 184, 0.1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); transition: 0.2s;}
        .back-btn:active { transform: scale(0.9); }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .exam-container { background: var(--card-bg); padding: 25px 20px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); border: 1px solid var(--border-color); backdrop-filter: blur(10px); transition: 0.5s; }
        
        .fade-in { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        /* HSC Format Styles */
        .exam-section { margin-bottom: 40px; }
        .q-main-title { font-family: 'Outfit'; font-size: 18px; font-weight: 800; color: var(--cyan); margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; line-height: 1.4; transition: 0.5s; }
        
        .question-block { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed var(--border-color); margin-left: 10px; }
        .question-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .q-title { font-size: 15px; font-weight: 800; color: var(--text-main); margin-bottom: 15px; line-height: 1.5; }
        
        /* MCQ Buttons */
        .mcq-opt { display: block; width: 100%; text-align: left; padding: 16px 20px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 14px; margin-bottom: 10px; font-family: inherit; font-size: 15px; font-weight: 700; color: var(--text-sub); cursor: pointer; transition: 0.2s; }
        .mcq-opt:active { transform: scale(0.98); }
        .mcq-opt.correct { background: rgba(16, 185, 129, 0.1) !important; border-color: #10b981 !important; color: #10b981 !important; }
        .mcq-opt.wrong { background: rgba(239, 68, 68, 0.1) !important; border-color: #ef4444 !important; color: #ef4444 !important; }
        
        /* Text Areas */
        .exam-textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); outline: none; font-family: inherit; font-size: 15px; color: var(--text-main); resize: vertical; min-height: 100px; background: var(--input-bg); transition: 0.2s; font-weight: 600; }
        .exam-textarea:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }
        
        /* Flow Chart Boxes */
        .flow-box { border: 2px solid var(--cyan); padding: 15px; border-radius: 12px; font-weight: 700; font-size: 14px; text-align: center; margin-bottom: 5px; width: 100%; color: var(--text-main); }
        .flow-box.filled { background: rgba(6, 182, 212, 0.1); border-style: solid; }
        .flow-box.empty { background: var(--input-bg); outline: none; border-style: dashed; border-color: var(--border-color); transition: 0.2s; }
        .flow-box.empty:focus { border-style: solid; border-color: var(--cyan); box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }
        
        /* WhatsApp Submit Button */
        .submit-wa-btn { width: 100%; background: linear-gradient(135deg, var(--pink), var(--cyan)); color: white; border: none; padding: 20px; border-radius: 16px; font-weight: 800; font-family: 'Outfit'; font-size: 18px; margin-top: 20px; cursor: pointer; box-shadow: 0 10px 25px rgba(6, 182, 212, 0.4); transition: transform 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .submit-wa-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <script>
        if(localStorage.getItem('champTheme') === 'light') { document.body.classList.add('light-mode'); }
    </script>

    <div class="header">
        <a href="#" onclick="history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align:right;">
            <h1 style="margin:0; font-family:'Outfit'; font-size:18px; color:var(--text-main);" id="ui-title">Lesson Exam</h1>
            <div style="font-size:11px; color:var(--pink); font-weight:800; text-transform:uppercase; letter-spacing:1.5px;">HSC Board Format</div>
        </div>
    </div>

    <div class="container fade-in">
        <div class="exam-container" id="exam-content">
            <div style="text-align:center; padding:40px 20px; color:var(--text-sub);">
                <i class="fas fa-circle-notch fa-spin" style="font-size:30px; margin-bottom:15px; color:var(--cyan);"></i>
                <div>Forging the Exam...</div>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script>
        const ExamEngine = {
            score: 0,
            totalMcqs: 0,

            init: function() {
                try {
                    const urlParams = new URLSearchParams(window.location.search);
                    const unitId = urlParams.get('unit') || 'u1_l1'; 
                    let passageData = typeof unitData !== 'undefined' ? unitData[unitId] : null;
                    
                    // TRUE FIX: No more fake questions. 
                    // If the database has no exam data for this specific unit, gracefully show a beautiful construction screen.
                    if(!passageData || !passageData.exam || !passageData.exam.mcqs || passageData.exam.mcqs.length === 0) {
                        
                        let rawTitle = passageData ? (passageData.title || "Lesson Exam") : "Lesson Exam";
                        document.getElementById('ui-title').innerText = rawTitle;

                        document.getElementById('exam-content').innerHTML = `
                            <div style="text-align:center; padding:60px 20px; animation: slideUpFade 0.4s ease;">
                                <i class="fas fa-tools" style="font-size:55px; color:var(--pink); margin-bottom:20px; filter: drop-shadow(0 0 20px rgba(236,72,153,0.5));"></i>
                                <h3 style="margin:0 0 10px; font-family:'Outfit'; color:var(--text-main); font-size:24px; font-weight:900;">Exam Forge Active</h3>
                                <p style="color:var(--text-sub); font-size:15px; margin:0; line-height: 1.6; font-weight:600;">Asif is currently hand-crafting the exclusive HSC board questions for this specific lesson.<br><br>Please check back soon!</p>
                            </div>`;
                        return; // Halt execution so it doesn't load the real exam UI
                    }

                    // If real exam data exists, proceed normally.
                    let rawTitle = passageData.title || "Lesson Exam";
                    document.getElementById('ui-title').innerText = rawTitle;

                    this.renderExam(passageData.exam);

                } catch (error) {
                    console.error("Exam Engine Error: ", error);
                    document.getElementById('exam-content').innerHTML = `
                        <div style="text-align:center; padding:40px 20px;">
                            <i class="fas fa-exclamation-triangle" style="font-size:40px; color:var(--pink); margin-bottom:15px;"></i>
                            <h3 style="margin:0 0 10px; font-family:'Outfit'; color:var(--text-main);">Database Sync Issue</h3>
                            <p style="color:var(--text-sub); font-size:14px; margin:0;">There was an error reading the database. Please refresh or inform Asif.</p>
                        </div>`;
                }
            },

            renderExam: function(examData) {
                let html = '';

                // QUESTION 1: MCQs
                if (examData.mcqs && examData.mcqs.length > 0) {
                    this.totalMcqs = examData.mcqs.length;
                    html += `<div class="exam-section">
                        <div class="q-main-title">1. Choose the correct answer from the following alternatives:</div>`;
                    
                    examData.mcqs.forEach((mcq, i) => {
                        let letter = String.fromCharCode(97 + i); // a, b, c, d...
                        html += `<div class="question-block">
                            <div class="q-title">${letter}) ${mcq.q}</div>`;
                        
                        let safeOptions = mcq.options || ["A", "B", "C", "D"];
                        safeOptions.forEach((opt, j) => {
                            let romanNum = ['i', 'ii', 'iii', 'iv', 'v', 'vi'][j] || (j+1);
                            html += `<button class="mcq-opt" id="mcq-${i}-${j}" onclick="ExamEngine.checkMcq(${i}, ${j}, ${mcq.ans})">${romanNum}. ${opt}</button>`;
                        });
                        html += `</div>`;
                    });
                    html += `</div>`;
                }

                // QUESTION 2: Open Ended
                if (examData.openEnded && examData.openEnded.length > 0) {
                    html += `<div class="exam-section">
                        <div class="q-main-title">2. Answer the following questions:</div>`;
                    
                    examData.openEnded.forEach((q, i) => {
                        let letter = String.fromCharCode(97 + i); // a, b, c...
                        html += `<div class="question-block">
                            <div class="q-title">${letter}) ${q}</div>
                            <textarea class="exam-textarea open-ended-ans" placeholder="Type your answer here..."></textarea>
                        </div>`;
                    });
                    html += `</div>`;
                }

                // QUESTION 3: Flow Chart
                if (examData.flowChartTopic) {
                    html += `<div class="exam-section">
                        <div class="q-main-title">3. Based on your reading of the passage, make a short flow chart showing ${examData.flowChartTopic}.</div>
                        <div style="display:flex; flex-direction:column; gap:8px; margin-left:10px;">
                            <div class="flow-box filled">1. ${examData.flowChartBox1}</div>`;
                    for(let i=2; i<=6; i++) {
                        html += `<div style="text-align:center; color:var(--border-color);"><i class="fas fa-arrow-down"></i></div>
                                 <input type="text" class="flow-box empty flow-ans" placeholder="${i}. Type your point here...">`;
                    }
                    html += `</div></div>`;
                }

                // QUESTION 4: Summary
                html += `<div class="exam-section" style="margin-bottom: 10px;">
                    <div class="q-main-title">4. Write a summary of the passage in your own words.</div>
                    <textarea class="exam-textarea summary-ans" style="height:150px; margin-left:10px; width:calc(100% - 10px);" placeholder="Start writing your summary here..."></textarea>
                </div>`;

                // WhatsApp Submit Button
                html += `<button class="submit-wa-btn" onclick="ExamEngine.submitToWhatsApp()"><i class="fab fa-whatsapp" style="font-size:24px;"></i> Submit Exam to Asif</button>`;

                document.getElementById('exam-content').innerHTML = html;
            },

            checkMcq: function(qIndex, selectedOpt, correctOpt) {
                let isFirstClick = false;
                for(let j=0; j<10; j++) { 
                    let btn = document.getElementById(`mcq-${qIndex}-${j}`);
                    if(!btn) continue;
                    if(!btn.disabled) isFirstClick = true; 
                    
                    btn.disabled = true;
                    btn.style.pointerEvents = 'none';
                    
                    if(j === correctOpt) {
                        btn.classList.add('correct');
                        btn.innerHTML += ' <i class="fas fa-check-circle" style="float:right;"></i>';
                    } else if (j === selectedOpt && j !== correctOpt) {
                        btn.classList.add('wrong');
                        btn.innerHTML += ' <i class="fas fa-times-circle" style="float:right;"></i>';
                    }
                }
                
                if(isFirstClick && selectedOpt === correctOpt) {
                    this.score++;
                }

                if(navigator.vibrate && localStorage.getItem('champSounds') !== 'false') {
                    navigator.vibrate(selectedOpt === correctOpt ? 50 : [50, 50, 50]);
                }
            },

            submitToWhatsApp: function() {
                let studentName = localStorage.getItem('champ_name') || "A Student";
                let examTitle = document.getElementById('ui-title').innerText;
                
                let msg = `🎓 *HSC Exam Submission*\n`;
                msg += `👤 *Name:* ${studentName}\n`;
                msg += `📖 *Topic:* ${examTitle}\n\n`;
                msg += `✅ *Q1. MCQ Score:* ${this.score} out of ${this.totalMcqs}\n\n`;
                
                let openEnded = document.querySelectorAll('.open-ended-ans');
                let flowBoxes = document.querySelectorAll('.flow-ans');
                let summary = document.querySelector('.summary-ans');
                
                let hasWrittenText = false;
                
                if(openEnded.length > 0) {
                    msg += `📝 *Q2. Written Answers:*\n`;
                    openEnded.forEach((ta, i) => {
                        if(ta.value.trim()) { 
                            let letter = String.fromCharCode(97 + i);
                            msg += `*${letter})* ${ta.value.trim()}\n\n`; 
                            hasWrittenText = true; 
                        }
                    });
                }
                
                if (flowBoxes.length > 0) {
                    msg += `📊 *Q3. Flow Chart:*\n`;
                    flowBoxes.forEach((fb, i) => {
                        if(fb.value.trim()) { msg += `Box ${i+2}: ${fb.value.trim()}\n`; hasWrittenText = true; }
                    });
                    msg += `\n`;
                }
                
                if (summary && summary.value.trim()) {
                    msg += `📑 *Q4. Summary:*\n${summary.value.trim()}\n`;
                    hasWrittenText = true;
                }

                if(!hasWrittenText) {
                    msg += `*(I have written my answers in my notebook and will send you a photo! 📸)*\n`;
                }

                let encoded = encodeURIComponent(msg);
                window.open(`https://wa.me/8801721149369?text=${encoded}`, '_blank');
            }
        };

        window.onload = () => ExamEngine.init();
    </script>
    
    <script src="ai-database.js"></script>
    <script src="global-engine.js"></script>
</body>
</html>
