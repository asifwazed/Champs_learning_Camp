<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSC Board Simulator - Champ's Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #e2e8f0; --text-sub: #94a3b8; 
            --pink: #f472b6; --cyan: #38bdf8; --header-bg: rgba(15, 23, 42, 0.9);
            --border-color: rgba(255, 255, 255, 0.08); --input-bg: #0f172a;
            --success: #10b981; --danger: #ef4444;
        }
        body.light-mode {
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #334155; --text-sub: #64748b; 
            --pink: #ec4899; --cyan: #0284c7; --header-bg: rgba(248, 250, 252, 0.9);
            --border-color: #e2e8f0; --input-bg: #f1f5f9;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; transition: 0.4s; }
        .header { padding: 25px 20px; background: var(--header-bg); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border-color); }
        .back-btn { color: var(--text-main); text-decoration: none; width: 45px; height: 45px; background: var(--input-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); }
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        
        .exam-section { margin-bottom: 40px; background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border-color); }
        .q-main-title { font-family: 'Outfit'; font-size: 18px; font-weight: 800; color: var(--cyan); margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .q-instruction { font-size: 15px; color: var(--text-sub); margin-bottom: 25px; line-height: 1.5; font-weight: 500; }
        
        .question-block { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px dashed var(--border-color); }
        .question-block:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        
        .mcq-opt { display: block; width: 100%; text-align: left; padding: 16px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 14px; margin-bottom: 10px; color: var(--text-main); font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Plus Jakarta Sans', sans-serif;}
        .mcq-opt:hover { border-color: var(--cyan); }
        .mcq-opt.correct { background: rgba(16, 185, 129, 0.15) !important; border-color: var(--success); color: var(--success); pointer-events: none; }
        .mcq-opt.wrong { background: rgba(239, 68, 68, 0.15) !important; border-color: var(--danger); color: var(--danger); pointer-events: none; }
        
        .exam-textarea { width: 100%; padding: 15px; border-radius: 12px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); min-height: 100px; font-family: inherit; font-size: 15px; resize: vertical; outline: none; box-sizing: border-box; }
        .exam-textarea:focus { border-color: var(--cyan); }
        
        .flow-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 15px; }
        .flow-box { border: 2px solid var(--cyan); padding: 15px; border-radius: 12px; text-align: center; font-weight: 700; background: var(--input-bg); color: var(--text-main); width: 90%; font-family: inherit; font-size: 15px; outline: none; }
        input.flow-box:focus { background: var(--card-bg); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }
        
        .submit-btn { width: 100%; background: linear-gradient(135deg, var(--pink), var(--cyan)); color: white; padding: 22px; border-radius: 18px; border: none; font-family: 'Outfit'; font-weight: 900; font-size: 18px; cursor: pointer; transition: transform 0.2s; }
        .submit-btn:hover { transform: scale(0.98); }
        
        .error-box { text-align:center; background:var(--card-bg); padding:40px 20px; border-radius:24px; border:2px solid var(--danger); margin-top: 20px; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>
    <script>if(localStorage.getItem('champTheme') === 'light') document.body.classList.add('light-mode');</script>
    <div class="header">
        <a href="units.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div style="text-align:right;">
            <h1 style="margin:0; font-family:'Outfit'; font-size:18px;" id="ui-title">Board Exam Simulator</h1>
            <div id="score-counter" style="font-size:11px; color:var(--pink); font-weight:900; letter-spacing:1px;">MCQ SCORE: 0/15</div>
        </div>
    </div>

    <div class="container" id="exam-content">
        <div style="text-align:center; padding: 50px; color: var(--text-sub);">
            <i class="fas fa-spinner fa-spin" style="font-size: 30px; margin-bottom: 15px; color: var(--cyan);"></i>
            <p>Loading Exam Data...</p>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="exam-db.js"></script>

    <script>
        const ExamEngine = {
            score: 0,
            init: function() {
                try {
                    // FAIL-SAFE 1: Check if exam-db.js crashed (Syntax Error in DB)
                    if (typeof examDB === 'undefined') {
                        document.getElementById('exam-content').innerHTML = `
                            <div class="error-box">
                                <i class="fas fa-exclamation-triangle" style="font-size:50px; color:var(--danger); margin-bottom:15px;"></i>
                                <h2 style="color:var(--danger); margin:0 0 10px 0; font-family:'Outfit';">Database Syntax Error!</h2>
                                <p style="color:var(--text-sub); font-size:15px; line-height:1.6; margin:0;">
                                    Your <b>exam-db.js</b> file failed to load. This means there is a missing comma, bracket, or quote somewhere in your database code.<br><br>
                                    <strong style="color:var(--text-main);">How to fix:</strong> Press <b>F12</b> on your keyboard, go to the <b>Console</b> tab, and it will show you exactly which line number has the typo!
                                </p>
                            </div>`;
                        return;
                    }

                    // Extract Unit ID from URL
                    const urlParams = new URLSearchParams(window.location.search);
                    const unitId = urlParams.get('unit') || 'u1_l1';
                    const data = examDB[unitId];

                    // FAIL-SAFE 2: Check if the specific lesson exists in exam-db.js
                    if(!data) {
                        document.getElementById('exam-content').innerHTML = `
                            <div class="error-box" style="border-color: var(--cyan); box-shadow: none;">
                                <i class="fas fa-folder-open" style="font-size:50px; color:var(--cyan); margin-bottom:15px;"></i>
                                <h2 style="color:var(--cyan); margin:0 0 10px 0; font-family:'Outfit';">Exam Not Ready</h2>
                                <p style="color:var(--text-sub); font-size:15px; margin:0;">
                                    The exam data for lesson <b>${unitId}</b> is not available in the database yet.
                                </p>
                            </div>`;
                        return;
                    }

                    // Set Title Safely
                    let pageTitle = "HSC Board Exam";
                    if (typeof unitData !== 'undefined' && unitData[unitId]) {
                        pageTitle = unitData[unitId].title;
                    }
                    document.getElementById('ui-title').innerText = pageTitle;
                    
                    // Render the Exam
                    this.render(data);

                } catch(err) {
                    // FAIL-SAFE 3: Catch any other execution errors
                    document.getElementById('exam-content').innerHTML = `
                        <div class="error-box">
                            <h2 style="color:var(--danger); margin:0 0 10px 0;">Engine Error</h2>
                            <p style="color:var(--text-sub);">${err.message}</p>
                        </div>`;
                }
            },
            
            render: function(data) {
                let html = '';
                
                // 1. MCQS (1 x 15 = 15)
                html += `<div class="exam-section">
                            <div class="q-main-title">1. Multiple Choice Questions (1 x 15 = 15)</div>
                            <div class="q-instruction">Choose the correct answer from the following alternatives:</div>`;
                
                data.mcqs.forEach((m, i) => {
                    const letter = String.fromCharCode(97 + i); // a, b, c...
                    html += `<div class="question-block" id="mcq-block-${i}">
                                <div style="font-weight:700; font-size:16px; margin-bottom:12px;">${letter}) ${m.q}</div>`;
                    m.options.forEach((opt, j) => {
                        html += `<button class="mcq-opt" onclick="ExamEngine.check(this, ${i}, ${j}, ${m.ans})">
                                    <span style="margin-right:8px; opacity:0.7;">${['i', 'ii', 'iii', 'iv'][j]}.</span> ${opt}
                                 </button>`;
                    });
                    html += `</div>`;
                });
                html += `</div>`;

                // 2. OPEN ENDED (2 x 5 = 10)
                html += `<div class="exam-section">
                            <div class="q-main-title">2. Open-Ended Questions (2 x 5 = 10)</div>
                            <div class="q-instruction">Answer the following questions:</div>`;
                
                data.openEnded.forEach((q, i) => {
                    const letter = String.fromCharCode(97 + i);
                    html += `<div class="question-block">
                                <div style="font-weight:700; margin-bottom:10px;">${letter}) ${q}</div>
                                <textarea class="exam-textarea" placeholder="Write your detailed answer here..."></textarea>
                             </div>`;
                });
                html += `</div>`;

                // 3. FLOW CHART (1 x 5 = 5)
                let fcTopic = data.flowChartTopic || "the main ideas of the passage.";
                let fcBox1 = data.flowChartBox1 || "Understanding the context";
                
                html += `<div class="exam-section">
                            <div class="q-main-title">3. Flow Chart (1 x 5 = 5)</div>
                            <div class="q-instruction">Based on your reading of the passage, make a short flow chart showing <b>${fcTopic}</b> (No. 1 has been done for you.)</div>
                            <div class="flow-container">`;
                
                // Box 1 (Pre-filled)
                html += `<div class="flow-box" style="background:var(--card-bg);">1. ${fcBox1}</div>`;
                
                // Boxes 2 to 6 (Inputs)
                for(let k = 2; k <= 6; k++) {
                    html += `<i class="fas fa-arrow-down" style="color:var(--cyan); font-size:20px;"></i>
                             <input type="text" class="flow-box" placeholder="${k}. Type point here...">`;
                }
                html += `</div></div>`;

                // 4. SUMMARY (10)
                let summaryPrompt = data.summaryTopic || "Write a summary of the passage in your own words.";
                html += `<div class="exam-section">
                            <div class="q-main-title">4. Summary Writing (10)</div>
                            <div class="q-instruction">${summaryPrompt}</div>
                            <textarea class="exam-textarea" style="min-height:220px;" placeholder="Write your summary here..."></textarea>
                         </div>`;
                
                // SUBMIT BUTTON
                html += `<button class="submit-btn" onclick="ExamEngine.submit()"><i class="fab fa-whatsapp" style="margin-right:8px;"></i> Submit Exam via WhatsApp</button>`;
                
                document.getElementById('exam-content').innerHTML = html;
            },
            
            check: function(btn, blockIdx, choiceIdx, correctIdx) {
                const block = document.getElementById(`mcq-block-${blockIdx}`);
                if(block.classList.contains('answered')) return;
                
                block.classList.add('answered');
                const options = block.querySelectorAll('.mcq-opt');
                
                // Disable all buttons in this block
                options.forEach(opt => opt.style.pointerEvents = 'none');

                if(choiceIdx === correctIdx) { 
                    btn.classList.add('correct'); 
                    this.score++; 
                } else { 
                    btn.classList.add('wrong'); 
                    options[correctIdx].classList.add('correct'); 
                }
                
                document.getElementById('score-counter').innerText = `MCQ SCORE: ${this.score}/15`;
            },
            
            submit: function() {
                const msg = `*Exam Finished!*\nSubject: ${document.getElementById('ui-title').innerText}\nMCQ Score: ${this.score}/15\n\n(Note: Open-ended, Flow Chart, and Summary need manual review.)`;
                window.open(`https://wa.me/8801721149369?text=${encodeURIComponent(msg)}`, '_blank');
            }
        };
        
        // Start Engine
        window.onload = () => ExamEngine.init();
    </script>
</body>
</html>
