<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSC Core Vocabulary</title>
    <meta name="theme-color" content="#09090b" id="theme-meta">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg: #09090b; 
            --card-bg: rgba(255, 255, 255, 0.03); 
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            --cyan: #06b6d4; 
            --gold: #fbbf24;
            --header-bg: rgba(9, 9, 11, 0.85);
            --border-color: rgba(255, 255, 255, 0.05);
            --shadow-color: rgba(0,0,0,0.6);
        }

        body.light-mode {
            --bg: #f8fafc; 
            --card-bg: rgba(255, 255, 255, 0.6); 
            --text-main: #0f172a; 
            --text-sub: #475569; 
            --cyan: #0284c7; 
            --gold: #d97706;
            --header-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(255, 255, 255, 0.5);
            --shadow-color: rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); transition: 0.5s; min-height: 100vh; padding-bottom: 50px; }

        .header { padding: 25px 20px 20px; background: var(--header-bg); backdrop-filter: blur(20px); display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border-color); box-shadow: 0 10px 30px var(--shadow-color); }
        .back-btn { color: var(--text-main); font-size: 20px; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border-color); }
        .h-title { font-family: 'Outfit'; font-size: 22px; font-weight: 800; color: var(--cyan); }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .animate-up { animation: slideUpFade 0.6s forwards; opacity: 0; transform: translateY(20px); }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }

        .tip-banner { background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(245,158,11,0.05)); border: 1px solid rgba(251,191,36,0.3); padding: 15px 20px; border-radius: 16px; display: flex; gap: 15px; align-items: center; margin-bottom: 25px; box-shadow: 0 10px 25px var(--shadow-color); }
        .tip-icon { font-size: 24px; color: var(--gold); }
        .tip-text h4 { margin: 0 0 4px; font-family: 'Outfit'; font-size: 15px; color: var(--gold); }
        .tip-text p { margin: 0; font-size: 12px; color: var(--text-main); line-height: 1.5; font-weight: 500; }

        .section-title { font-family: 'Outfit'; font-size: 14px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 2px; margin: 0 0 15px; display: flex; align-items: center; gap: 12px; }
        .section-title::after { content: ''; flex-grow: 1; height: 1px; background: linear-gradient(90deg, var(--border-color), transparent); }

        .vocab-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .v-item { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px var(--shadow-color); }
        
        .v-left { display: flex; flex-direction: column; gap: 4px; }
        .v-word { font-family: 'Outfit'; font-size: 18px; font-weight: 800; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .v-type { font-size: 10px; padding: 2px 6px; background: rgba(6, 182, 212, 0.1); color: var(--cyan); border-radius: 4px; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(6, 182, 212, 0.2); }
        
        .v-right { text-align: right; }
        .v-meaning { font-size: 15px; font-weight: 700; color: #10b981; margin-bottom: 3px; }
        .v-synonym { font-size: 11px; color: var(--text-sub); font-weight: 600; }

    </style>
</head>
<body>

    <script>
        if(localStorage.getItem('champTheme') === 'light') { document.body.classList.add('light-mode'); }
    </script>

    <div class="header">
        <a href="hsc_crash.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <div>
            <h1 class="h-title">Core Vocabulary</h1>
            <div style="font-size: 11px; color: var(--text-sub); font-weight: 700; letter-spacing: 1px;">THE ONLY WORDS YOU NEED</div>
        </div>
    </div>

    <div class="container">
        
        <div class="tip-banner animate-up">
            <div class="tip-icon"><i class="fas fa-bolt"></i></div>
            <div class="tip-text">
                <h4>Asif's Fast-Track Rule</h4>
                <p>Do not try to memorize the dictionary. Master these specific passage words and linking words to survive the synonym/antonym questions.</p>
            </div>
        </div>

        <div class="section-title animate-up" style="animation-delay: 0.1s;"><i class="fas fa-database" style="color:var(--cyan);"></i> Database Loading...</div>
        
        <div class="vocab-list" id="vocab-container" style="animation-delay: 0.2s;"></div>

    </div>

    <script src="hsc-db.js"></script>
    <script src="hsc-engine.js"></script>
</body>
</html>
